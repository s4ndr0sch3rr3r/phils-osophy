name: Apply detail favorite and book rating

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/movie-favorite-book-inline-rating
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Apply source changes and validate build
        run: |
          python .github/scripts/apply_detail_favorite_and_book_rating.py
          chmod +x gradlew
          set +e
          TMDB_READ_TOKEN=placeholder RAWG_API_KEY=placeholder ./gradlew :app:assembleDebug > .github/detail-controls-build.log 2>&1
          code=$?
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java .github/detail-controls-build.log
          git commit -m "Add Movie favorite and Book inline rating controls" || true
          git push origin HEAD:agent/movie-favorite-book-inline-rating
          exit $code
