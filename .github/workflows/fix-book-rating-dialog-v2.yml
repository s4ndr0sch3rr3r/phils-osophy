name: Apply final book rating placement fix

on:
  push:
    branches:
      - agent/add-ratings-all-media
    paths:
      - .github/workflows/fix-book-rating-dialog-v2.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-ratings-all-media
          fetch-depth: 0
      - name: Move rating dialog inside BookDetailScreen
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt')
          text = path.read_text(encoding='utf-8')
          close = '''    if (showManageDialog) {
              BookManageDialog(
                  book = book,
                  onSave = { status, progress ->
                      onSaveReadingState(status, progress)
                      showManageDialog = false
                  },
                  onRemove = {
                      onRemove()
                      showManageDialog = false
                  },
                  onCancel = {
                      showManageDialog = false
                  }
              )
          }
          }

          @Composable
          private fun ReadingProgressBar'''
          fixed = '''    if (showManageDialog) {
              BookManageDialog(
                  book = book,
                  onSave = { status, progress ->
                      onSaveReadingState(status, progress)
                      showManageDialog = false
                  },
                  onRemove = {
                      onRemove()
                      showManageDialog = false
                  },
                  onCancel = {
                      showManageDialog = false
                  }
              )
          }

              if (showRatingDialog) {
                  UserRatingDialog(
                      title = "Rate ${book.title}",
                      initialRating = book.userRating,
                      onSave = { rating ->
                          onChangeRating(rating)
                          showRatingDialog = false
                      },
                      onCancel = { showRatingDialog = false }
                  )
              }
          }

          @Composable
          private fun ReadingProgressBar'''
          if text.count(close) != 1:
              raise SystemExit(f'close match count {text.count(close)}')
          text = text.replace(close, fixed, 1)
          stray = '''

              if (showRatingDialog) {
                  UserRatingDialog(
                      title = "Rate ${book.title}",
                      initialRating = book.userRating,
                      onSave = { rating ->
                          onChangeRating(rating)
                          showRatingDialog = false
                      },
                      onCancel = { showRatingDialog = false }
                  )
              }
          }
          '''
          if text.count(stray) != 1:
              raise SystemExit(f'stray match count {text.count(stray)}')
          text = text.replace(stray, '\n', 1)
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/scripts/fix_book_rating_dialog.py
          rm -f .github/workflows/fix-book-rating-dialog.yml
          rm -f .github/workflows/fix-book-rating-dialog-v2.yml
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Fix book rating dialog placement"
          git push origin HEAD:agent/add-ratings-all-media
