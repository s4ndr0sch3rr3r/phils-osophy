name: Apply header alignment updates

on:
  push:
    branches:
      - agent/align-header-and-movie-titles

permissions:
  contents: write

jobs:
  patch-ui:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/align-header-and-movie-titles
          fetch-depth: 0

      - name: Apply targeted UI patches
        shell: python
        run: |
          from pathlib import Path

          ROOT = Path("app/src/main/java/com/example/phils_osophy")

          def replace_once(relative_path: str, old: str, new: str) -> None:
              path = ROOT / relative_path
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise SystemExit(
                      f"Expected exactly one match in {relative_path}, found {count}"
                  )
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "ui/screens/MovieSearchScreen.kt",
              '''        Row(
                      modifier = Modifier.fillMaxWidth(),
                      verticalAlignment = Alignment.CenterVertically
                  ) {
                      Text(
                          text = "Movies",''',
              '''        Row(
                      modifier = Modifier
                          .fillMaxWidth()
                          .padding(end = 50.dp),
                      verticalAlignment = Alignment.CenterVertically
                  ) {
                      Text(
                          text = "Movies",'''
          )

          replace_once(
              "ui/screens/SeriesLibraryScreen.kt",
              '''        Row(
                      modifier = Modifier.fillMaxWidth(),
                      verticalAlignment = Alignment.CenterVertically
                  ) {
                      Text(
                          text = "Series",''',
              '''        Row(
                      modifier = Modifier
                          .fillMaxWidth()
                          .padding(end = 50.dp),
                      verticalAlignment = Alignment.CenterVertically
                  ) {
                      Text(
                          text = "Series",'''
          )

          replace_once(
              "ui/screens/BooksMenuScreen.kt",
              '''        Row(
                      modifier = Modifier.fillMaxWidth(),
                      verticalAlignment = Alignment.CenterVertically
                  ) {
                      Text(
                          text = "Books",''',
              '''        Row(
                      modifier = Modifier
                          .fillMaxWidth()
                          .padding(end = 50.dp),
                      verticalAlignment = Alignment.CenterVertically
                  ) {
                      Text(
                          text = "Books",'''
          )

          replace_once(
              "ui/screens/BooksMenuScreen.kt",
              '''        Row(
                      modifier = Modifier.fillMaxWidth(),
                      verticalAlignment = Alignment.CenterVertically
                  ) {
                      Text(
                          text = "Book details",''',
              '''        Row(
                      modifier = Modifier
                          .fillMaxWidth()
                          .padding(end = 50.dp),
                      verticalAlignment = Alignment.CenterVertically
                  ) {
                      Text(
                          text = "Book details",'''
          )

          replace_once(
              "ui/screens/SeriesDetailScreen.kt",
              '''            modifier = Modifier
                          .align(Alignment.TopEnd)
                          .statusBarsPadding()
                          .padding(end = 8.dp, top = 8.dp)
                  ) {''',
              '''            modifier = Modifier
                          .align(Alignment.TopEnd)
                          .statusBarsPadding()
                          .padding(end = 58.dp, top = 8.dp)
                  ) {'''
          )

          replace_once(
              "ui/screens/MovieDetailScreen.kt",
              '''                modifier = Modifier
                          .align(Alignment.TopEnd)
                          .statusBarsPadding()
                          .padding(end = 8.dp, top = 8.dp)
                  ) {''',
              '''                modifier = Modifier
                          .align(Alignment.TopEnd)
                          .statusBarsPadding()
                          .padding(end = 58.dp, top = 8.dp)
                  ) {'''
          )

          movie_list_path = ROOT / "ui/screens/MovieListScreen.kt"
          movie_list = movie_list_path.read_text(encoding="utf-8")
          old_spacing = "verticalArrangement = Arrangement.spacedBy(4.dp)"
          if movie_list.count(old_spacing) != 1:
              raise SystemExit("Unexpected MovieListScreen grid spacing")
          movie_list = movie_list.replace(
              old_spacing,
              "verticalArrangement = Arrangement.spacedBy(10.dp)",
              1
          )

          marker = '''@Composable
          private fun MoviePosterTile('''
          marker_index = movie_list.find(marker)
          if marker_index < 0:
              raise SystemExit("MoviePosterTile marker not found")

          new_movie_tile = '''@Composable
          private fun MoviePosterTile(
              movie: SavedMovieEntity,
              onClick: () -> Unit,
              onFavoriteClick: () -> Unit
          ) {
              val posterUrl = movie.posterPath
                  ?.takeIf { path -> path.isNotBlank() }
                  ?.let { path -> "$TMDB_POSTER_BASE_URL$path" }

              var isLoaded by remember(posterUrl) {
                  mutableStateOf(false)
              }
              var hasError by remember(posterUrl) {
                  mutableStateOf(false)
              }

              Column(modifier = Modifier.fillMaxWidth()) {
                  Card(
                      onClick = onClick,
                      modifier = Modifier
                          .fillMaxWidth()
                          .aspectRatio(2f / 3f)
                  ) {
                      Box(
                          modifier = Modifier
                              .fillMaxSize()
                              .background(MaterialTheme.colorScheme.surfaceVariant),
                          contentAlignment = Alignment.Center
                      ) {
                          if (posterUrl != null) {
                              AsyncImage(
                                  model = ImageRequest.Builder(LocalContext.current)
                                      .data(posterUrl)
                                      .crossfade(true)
                                      .build(),
                                  contentDescription = "${movie.title} poster",
                                  modifier = Modifier.fillMaxSize(),
                                  contentScale = ContentScale.Crop,
                                  onLoading = {
                                      isLoaded = false
                                      hasError = false
                                  },
                                  onSuccess = {
                                      isLoaded = true
                                      hasError = false
                                  },
                                  onError = {
                                      isLoaded = false
                                      hasError = true
                                  }
                              )
                          }

                          if (posterUrl == null || !isLoaded || hasError) {
                              Box(
                                  modifier = Modifier
                                      .fillMaxSize()
                                      .background(Color.Black.copy(alpha = 0.76f)),
                                  contentAlignment = Alignment.Center
                              ) {
                                  Text(
                                      text = movie.title,
                                      modifier = Modifier.padding(10.dp),
                                      color = Color.White,
                                      style = MaterialTheme.typography.titleSmall,
                                      fontWeight = FontWeight.SemiBold,
                                      textAlign = TextAlign.Center,
                                      maxLines = 4,
                                      overflow = TextOverflow.Ellipsis
                                  )
                              }
                          }

                          Box(
                              modifier = Modifier
                                  .align(Alignment.TopStart)
                                  .padding(5.dp)
                                  .size(34.dp)
                                  .clip(CircleShape)
                                  .background(Color.Black.copy(alpha = 0.62f))
                                  .clickable(onClick = onFavoriteClick),
                              contentAlignment = Alignment.Center
                          ) {
                              Text(
                                  text = if (movie.isFavorite) "♥" else "♡",
                                  color = if (movie.isFavorite) {
                                      FavoriteColor
                                  } else {
                                      Color.White
                                  },
                                  fontSize = 26.sp,
                                  fontWeight = FontWeight.Bold
                              )
                          }

                          if (movie.userRating in 1..10) {
                              Box(
                                  modifier = Modifier
                                      .align(Alignment.TopEnd)
                                      .padding(6.dp)
                                      .size(30.dp)
                                      .clip(CircleShape)
                                      .background(RatingBadgeColor),
                                  contentAlignment = Alignment.Center
                              ) {
                                  Text(
                                      text = movie.userRating.toString(),
                                      color = Color.White,
                                      style = MaterialTheme.typography.labelLarge,
                                      fontWeight = FontWeight.Bold
                                  )
                              }
                          }
                      }
                  }

                  Spacer(modifier = Modifier.height(4.dp))
                  Text(
                      text = movie.title,
                      modifier = Modifier
                          .fillMaxWidth()
                          .padding(horizontal = 2.dp),
                      style = MaterialTheme.typography.bodyMedium.copy(
                          fontSize = 14.sp,
                          lineHeight = 16.sp
                      ),
                      maxLines = 1,
                      overflow = TextOverflow.Ellipsis
                  )
              }
          }
          '''

          movie_list = movie_list[:marker_index] + new_movie_tile
          movie_list_path.write_text(movie_list, encoding="utf-8")

      - name: Commit UI updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/phils_osophy
          git commit -m "Align header actions and add movie titles"
          git push origin HEAD:agent/align-header-and-movie-titles

# Triggered after the workflow file already existed on the branch.
