name: Record ratings build validation result

on:
  push:
    branches:
      - agent/add-ratings-all-media
    paths:
      - .github/workflows/validate-ratings-build-v2.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-ratings-all-media
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Build debug APK
        id: build
        continue-on-error: true
        run: ./gradlew :app:assembleDebug --stacktrace
      - name: Record result and clean validation files
        if: always()
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
        run: |
          printf '%s\n' "$BUILD_OUTCOME" > ratings-build-result.txt
          rm -f .github/workflows/validate-ratings-build.yml
          rm -f .github/workflows/validate-ratings-build-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record ratings build validation"
          git push origin HEAD:agent/add-ratings-all-media
