name: Apply GDPR local movie skip

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-gdpr-local-movie-skip.yml

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/gdpr-skip-existing-movies
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Patch local Movie lookup
        run: |
          python3 - <<'PY'
          from pathlib import Path

          dao_path = Path('app/src/main/java/com/example/phils_osophy/data/local/SavedMovieDao.kt')
          dao = dao_path.read_text()
          old_dao = '''    fun observeAll(): Flow<List<SavedMovieEntity>>

    @Insert(onConflict = OnConflictStrategy.IGNORE)
'''
          new_dao = '''    fun observeAll(): Flow<List<SavedMovieEntity>>

    @Query("SELECT * FROM saved_movies")
    suspend fun getAll(): List<SavedMovieEntity>

    @Insert(onConflict = OnConflictStrategy.IGNORE)
'''
          if old_dao not in dao:
              raise SystemExit('Expected SavedMovieDao insertion point was not found')
          dao_path.write_text(dao.replace(old_dao, new_dao))

          importer_path = Path('app/src/main/java/com/example/phils_osophy/data/importer/ParallelTvTimeGdprImporter.kt')
          importer = importer_path.read_text()

          old_setup = '''        val seriesEntries = parsed.series.values.toList()
        val movieEntries = parsed.movies.values.toList()
        Log.i(
            IMPORT_LOG_TAG,
            "Starting TMDB matching for ${seriesEntries.size} series and " +
                "${movieEntries.size} movies"
        )

        val semaphore = Semaphore(MAX_CONCURRENT_TMDB_LOOKUPS)
'''
          new_setup = '''        val seriesEntries = parsed.series.values.toList()
        val movieEntries = parsed.movies.values.toList()
        val database = PhilsOsophyDatabase.getInstance(context)
        val seriesDao = database.savedSeriesDao()
        val movieDao = database.savedMovieDao()
        val watchedEpisodeDao = database.watchedEpisodeDao()
        val savedMovieKeys = movieDao.getAll()
            .mapTo(mutableSetOf()) { movie -> normalizedParallelMovieKey(movie.title) }
        val moviesToResolve = movieEntries.filter { imported ->
            val alreadySaved = normalizedParallelMovieKey(imported.title) in savedMovieKeys
            if (alreadySaved) {
                Log.d(
                    IMPORT_LOG_TAG,
                    "Movie already saved; skipping TMDB lookup: ${imported.title}"
                )
            }
            !alreadySaved
        }
        val alreadySavedMovieCount = movieEntries.size - moviesToResolve.size
        Log.i(
            IMPORT_LOG_TAG,
            "Starting TMDB matching for ${seriesEntries.size} series and " +
                "${moviesToResolve.size} movies; $alreadySavedMovieCount movies already saved"
        )

        val semaphore = Semaphore(MAX_CONCURRENT_TMDB_LOOKUPS)
'''
          if old_setup not in importer:
              raise SystemExit('Expected importer setup block was not found')
          importer = importer.replace(old_setup, new_setup)

          old_movies = '''            val movieDeferred = movieEntries.mapIndexed { index, imported ->
                async {
                    semaphore.withPermit {
                        resolveMovie(imported, index, movieEntries.size)
                    }
                }
            }
'''
          new_movies = '''            val movieDeferred = moviesToResolve.mapIndexed { index, imported ->
                async {
                    semaphore.withPermit {
                        resolveMovie(imported, index, moviesToResolve.size)
                    }
                }
            }
'''
          if old_movies not in importer:
              raise SystemExit('Expected Movie coroutine block was not found')
          importer = importer.replace(old_movies, new_movies)

          old_database = '''        val database = PhilsOsophyDatabase.getInstance(context)
        val seriesDao = database.savedSeriesDao()
        val movieDao = database.savedMovieDao()
        val watchedEpisodeDao = database.watchedEpisodeDao()
        var importedSeriesCount = 0
'''
          new_database = '''        var importedSeriesCount = 0
'''
          if old_database not in importer:
              raise SystemExit('Expected duplicate database block was not found')
          importer = importer.replace(old_database, new_database)

          old_helpers = '''private fun cleanParallelTitle(value: String): String =
    value.trim().replace(Regex("\\\\s+"), " ")

private fun normalizedParallelTitle(value: String): String {
'''
          new_helpers = '''private val ParallelTrailingReleaseYearPattern =
    Regex("""\\s*(?:\\(\\d{4}\\)|\\[\\d{4}])\\s*$""")

private fun cleanParallelTitle(value: String): String =
    value.trim().replace(Regex("\\\\s+"), " ")

private fun normalizedParallelMovieKey(value: String): String =
    normalizedParallelTitle(value.replace(ParallelTrailingReleaseYearPattern, ""))

private fun normalizedParallelTitle(value: String): String {
'''
          if old_helpers not in importer:
              raise SystemExit('Expected title helper block was not found')
          importer_path.write_text(importer.replace(old_helpers, new_helpers))
          PY

      - name: Build debug APK
        env:
          TMDB_READ_TOKEN: placeholder-token
          RAWG_API_KEY: placeholder-key
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Commit validated fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/src/main/java/com/example/phils_osophy/data/local/SavedMovieDao.kt
          git add app/src/main/java/com/example/phils_osophy/data/importer/ParallelTvTimeGdprImporter.kt
          git commit -m "Skip existing Movies during GDPR import"
          git push
