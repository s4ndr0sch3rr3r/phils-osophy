name: Apply detail impressions editor

on:
  push:
    branches:
      - agent/detail-impressions-keyboard

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/detail-impressions-keyboard
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply focused source changes
        run: python .github/scripts/apply_detail_impressions.py
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/phils_osophy/ui/screens/MediaCommentComponents.kt app/src/main/java/com/example/phils_osophy/ui/screens/MovieDetailScreen.kt
          if git diff --cached --quiet; then
            echo "No changes generated"
          else
            git commit -m "Improve detail impressions editor"
            git push origin HEAD:agent/detail-impressions-keyboard
          fi
