name: Apply GDPR TMDB retry fix

on:
  push:
    branches: [agent/fix-gdpr-tmdb-retries]

permissions:
  contents: write

jobs:
  patch-and-validate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-gdpr-tmdb-retries
          fetch-depth: 0

      - name: Patch TMDB retry and movie matching
        run: |
          python3 - <<'PY'
          from pathlib import Path

          client_path = Path('app/src/main/java/com/example/phils_osophy/data/remote/TmdbClient.kt')
          client = client_path.read_text()
          client = client.replace(
              'package com.example.phils_osophy.data.remote\n\nimport com.example.phils_osophy.BuildConfig\nimport java.util.concurrent.TimeUnit\n',
              '''package com.example.phils_osophy.data.remote

import android.util.Log
import com.example.phils_osophy.BuildConfig
import java.io.IOException
import java.util.concurrent.TimeUnit
import okhttp3.Interceptor
import okhttp3.Request
import okhttp3.Response
'''
          )
          client = client.replace(
              'import retrofit2.converter.kotlinx.serialization.asConverterFactory\n\nobject TmdbClient {\n',
              '''import retrofit2.converter.kotlinx.serialization.asConverterFactory

private const val TMDB_HTTP_MAX_RETRIES = 4
private const val TMDB_HTTP_RETRY_BASE_DELAY_MILLIS = 1_000L
private const val TMDB_HTTP_RETRY_MAX_DELAY_MILLIS = 8_000L
private const val TMDB_HTTP_RETRY_AFTER_MAX_DELAY_MILLIS = 30_000L
private const val TMDB_HTTP_LOG_TAG = "TmdbClient"

private val RetryableTmdbStatusCodes = setOf(429, 500, 502, 503, 504)

object TmdbClient {
'''
          )
          client = client.replace(
              '            chain.proceed(request)\n',
              '            executeTmdbRequestWithRetry(chain, request)\n'
          )
          client += '''

private fun executeTmdbRequestWithRetry(
    chain: Interceptor.Chain,
    request: Request
): Response {
    var retryCount = 0

    while (true) {
        try {
            val response = chain.proceed(request)
            if (
                response.code !in RetryableTmdbStatusCodes ||
                retryCount >= TMDB_HTTP_MAX_RETRIES
            ) {
                return response
            }

            val delayMillis = tmdbRetryDelayMillis(
                retryCount = retryCount,
                retryAfterHeader = response.header("Retry-After")
            )
            Log.w(
                TMDB_HTTP_LOG_TAG,
                "TMDB returned HTTP ${response.code} for ${request.url.encodedPath}; " +
                    "retry ${retryCount + 1}/$TMDB_HTTP_MAX_RETRIES in ${delayMillis}ms"
            )
            response.close()
            sleepBeforeTmdbRetry(delayMillis)
        } catch (exception: IOException) {
            if (retryCount >= TMDB_HTTP_MAX_RETRIES) {
                throw exception
            }

            val delayMillis = tmdbRetryDelayMillis(
                retryCount = retryCount,
                retryAfterHeader = null
            )
            Log.w(
                TMDB_HTTP_LOG_TAG,
                "TMDB request failed for ${request.url.encodedPath}; " +
                    "retry ${retryCount + 1}/$TMDB_HTTP_MAX_RETRIES in ${delayMillis}ms",
                exception
            )
            sleepBeforeTmdbRetry(delayMillis)
        }

        retryCount += 1
    }
}

private fun tmdbRetryDelayMillis(
    retryCount: Int,
    retryAfterHeader: String?
): Long {
    val retryAfterMillis = retryAfterHeader
        ?.trim()
        ?.toLongOrNull()
        ?.times(1_000L)
        ?.coerceIn(0L, TMDB_HTTP_RETRY_AFTER_MAX_DELAY_MILLIS)
    if (retryAfterMillis != null) {
        return retryAfterMillis
    }

    return (TMDB_HTTP_RETRY_BASE_DELAY_MILLIS * (1L shl retryCount))
        .coerceAtMost(TMDB_HTTP_RETRY_MAX_DELAY_MILLIS)
}

private fun sleepBeforeTmdbRetry(delayMillis: Long) {
    try {
        Thread.sleep(delayMillis)
    } catch (exception: InterruptedException) {
        Thread.currentThread().interrupt()
        throw IOException("TMDB retry was interrupted.", exception)
    }
}
'''
          client_path.write_text(client)

          importer_path = Path('app/src/main/java/com/example/phils_osophy/data/importer/ParallelTvTimeGdprImporter.kt')
          importer = importer_path.read_text()
          old = '''private suspend fun findParallelMovie(title: String): MovieDto? {
    val results = try {
        TmdbClient.api.searchMovies(query = title).results
    } catch (exception: Exception) {
        if (exception is CancellationException) throw exception
        Log.e(IMPORT_LOG_TAG, "Movie lookup failed: $title", exception)
        emptyList()
    }
    val requested = normalizedParallelTitle(title)
    return results.firstOrNull { normalizedParallelTitle(it.title) == requested }
        ?: results.firstOrNull()
}
'''
          new = '''private suspend fun findParallelMovie(title: String): MovieDto? {
    val results = try {
        TmdbClient.api.searchMovies(query = title).results
    } catch (exception: Exception) {
        if (exception is CancellationException) throw exception
        Log.e(IMPORT_LOG_TAG, "Movie lookup failed after retries: $title", exception)
        emptyList()
    }

    if (results.isEmpty()) {
        Log.w(IMPORT_LOG_TAG, "TMDB returned no movie results: $title")
    }

    // TMDB search results are relevance ordered. Use the first result so localized titles,
    // punctuation differences, and duplicate names do not block otherwise valid imports.
    return results.firstOrNull()
}
'''
          if old not in importer:
              raise SystemExit('Expected Movie lookup implementation was not found')
          importer_path.write_text(importer.replace(old, new))
          PY

      - name: Build debug APK
        env:
          TMDB_READ_TOKEN: placeholder-token
          RAWG_API_KEY: placeholder-key
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug

      - name: Commit validated fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git rm .github/workflows/apply-gdpr-tmdb-retry-fix.yml
          git add app/src/main/java/com/example/phils_osophy/data/remote/TmdbClient.kt
          git add app/src/main/java/com/example/phils_osophy/data/importer/ParallelTvTimeGdprImporter.kt
          git commit -m "Fix GDPR movie TMDB lookups"
          git push
