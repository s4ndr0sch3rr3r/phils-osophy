name: Validate ratings implementation

on:
  push:
    branches:
      - agent/add-ratings-all-media
    paths:
      - .github/workflows/validate-ratings-build.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-ratings-all-media
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - uses: android-actions/setup-android@v3
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --stacktrace
      - name: Remove one-shot validation workflow
        run: |
          rm .github/workflows/validate-ratings-build.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove temporary ratings validation workflow"
          git push origin HEAD:agent/add-ratings-all-media
