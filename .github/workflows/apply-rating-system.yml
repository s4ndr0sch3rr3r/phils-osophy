name: Apply rating system changes

on:
  push:
    branches:
      - agent/add-ratings-all-media
    paths:
      - .github/scripts/apply_rating_system.py
      - .github/workflows/apply-rating-system.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-ratings-all-media
          fetch-depth: 0
      - name: Apply focused source changes
        run: python .github/scripts/apply_rating_system.py
      - name: Commit generated implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Add ratings for series games and books"
          git push origin HEAD:agent/add-ratings-all-media
