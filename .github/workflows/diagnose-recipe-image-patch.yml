name: Diagnose recipe image patch

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/recipe-image-search'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Check patch anchors
        shell: python
        run: |
          from pathlib import Path

          recipe = Path("app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt").read_text()
          detail = Path("app/src/main/java/com/example/phils_osophy/ui/screens/RecipeDetailScreen.kt").read_text()
          checks = {
              "recipe material imports": (recipe, "import androidx.compose.material3.Card\nimport androidx.compose.material3.MaterialTheme"),
              "recipe runtime imports": (recipe, "import androidx.compose.runtime.Composable\nimport androidx.compose.runtime.getValue"),
              "recipe layout imports": (recipe, "import androidx.compose.ui.input.nestedscroll.nestedScroll\nimport androidx.compose.ui.text.font.FontWeight"),
              "recipe coil imports": (recipe, "import androidx.compose.ui.unit.dp\nimport com.example.phils_osophy.data.local.RecipeStatus"),
              "recipe client imports": (recipe, "import com.example.phils_osophy.data.local.SavedRecipeEntity\nimport com.example.phils_osophy.ui.components.FavoriteIcon"),
              "recipe locale import": (recipe, "import java.util.Locale\n"),
              "recipe state": (recipe, '''    var query by remember { mutableStateOf("") }
              var searchedTitle by remember { mutableStateOf<String?>(null) }
              var showFavoritesOnly by remember { mutableStateOf(false) }
              var isSearchBarVisible by remember { mutableStateOf(true) }
              var pendingRecipeTitle by remember { mutableStateOf<String?>(null) }
              val expandedSections = remember {
                  mutableStateMapOf<String, Boolean>()
              }
          '''),
              "saved keys": (recipe, '''    val savedRecipeKeys = remember(allRecipes) {
                  allRecipes.map { recipe -> recipe.key }.toSet()
              }

              fun filtered(recipes: List<SavedRecipeEntity>): List<SavedRecipeEntity> =
          '''),
              "search funcs": (recipe, '''    fun performSearch() {
                  searchedTitle = query.trim()
                      .replace(Regex("\\s+"), " ")
                      .takeIf { title -> title.isNotBlank() }
              }

              fun resetSearch() {
                  searchedTitle = null
              }
          '''),
              "section calls": (recipe, '''                    onRecipeClick = onRecipeClick,
                      onFavoriteClick = onFavoriteClick
                  )'''),
              "search else": (recipe, '''        } else {
                  val title = searchedTitle.orEmpty()
                  val recipeKey = title.lowercase(Locale.ROOT)
                  Box(
                      modifier = Modifier
                          .weight(1f)
                          .fillMaxWidth()
                  ) {
                      RecipeSearchResult(
                          title = title,
                          isAdded = recipeKey in savedRecipeKeys,
                          modifier = Modifier.fillMaxWidth(),
                          onAddClick = {
                              pendingRecipeTitle = title
                          }
                      )
                  }
              }
          '''),
              "pending dialog": (recipe, '''    pendingRecipeTitle?.let { title ->
                  RecipeAddDialog(
                      title = title,
                      onAdd = { status ->
                          onAddRecipe(title, status)
                          pendingRecipeTitle = null
                          query = ""
                          resetSearch()
                      },
                      onCancel = {
                          pendingRecipeTitle = null
                      }
                  )
              }
          '''),
              "section signature": (recipe, '''private fun LazyListScope.recipeSectionItems(
              title: String,
              recipes: List<SavedRecipeEntity>,
              isExpanded: Boolean,
              onToggleExpanded: () -> Unit,
              onRecipeClick: (String) -> Unit,
              onFavoriteClick: (recipeKey: String, isFavorite: Boolean) -> Unit
          ) {
          '''),
              "card calls": (recipe, '''                        RecipeCard(
                              recipe = recipe,
                              onClick = {
                                  onRecipeClick(recipe.key)
                              },
                              onFavoriteClick = {
                                  onFavoriteClick(recipe.key, !recipe.isFavorite)
                              }
                          )'''),
              "card function": (recipe, '''@Composable
          private fun RecipeCard(
              recipe: SavedRecipeEntity,
              onClick: () -> Unit,
              onFavoriteClick: () -> Unit
          ) {
              Column(modifier = Modifier.width(104.dp)) {
                  Card(
                      modifier = Modifier
                          .size(104.dp)
                          .clickable(onClick = onClick)
                  ) {
                      Box(
                          modifier = Modifier
                              .fillMaxSize()
                              .background(MaterialTheme.colorScheme.surfaceVariant)
                      ) {
                          FavoriteIcon(
          '''),
              "search card function": (recipe, '''@Composable
          private fun RecipeSearchResult(
              title: String,
              isAdded: Boolean,
              modifier: Modifier = Modifier,
              onAddClick: () -> Unit
          ) {
          '''),
              "detail material imports": (detail, "import androidx.compose.material3.Button\nimport androidx.compose.material3.DropdownMenu"),
              "detail runtime imports": (detail, "import androidx.compose.runtime.Composable\nimport androidx.compose.runtime.getValue"),
              "detail client imports": (detail, "import com.example.phils_osophy.data.local.SavedRecipeEntity\nimport com.example.phils_osophy.ui.components.FavoriteIcon"),
              "detail picsum": (detail, '''    val coroutineScope = rememberCoroutineScope()
              val imageUrl = remember(recipe.key) {
                  "https://picsum.photos/seed/recipe-${recipe.key.hashCode()}/1200/800"
              }
          '''),
              "detail async image": (detail, '''            AsyncImage(
                          model = ImageRequest.Builder(LocalContext.current)
                              .data(imageUrl)
                              .crossfade(true)
                              .build(),
                          contentDescription = "${recipe.title} image",
                          modifier = Modifier.fillMaxSize(),
                          contentScale = ContentScale.Crop
                      )
          '''),
          }

          report = "\n".join(f"{name}: {text.count(anchor)}" for name, (text, anchor) in checks.items())
          Path("recipe-image-patch-diagnostics.txt").write_text(report + "\n")

      - name: Commit diagnostics
        run: |
          rm .github/workflows/diagnose-recipe-image-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record Recipe image patch diagnostics"
          git push origin HEAD:${{ github.head_ref }}
