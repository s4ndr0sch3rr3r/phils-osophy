name: Validate Recipe details

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/recipe-detail-screens

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Apply Recipe detail integration
        run: |
          python tools/apply_recipe_details.py
          python - <<'PY'
          from pathlib import Path
          path = Path("app/src/main/java/com/example/phils_osophy/ui/screens/RecipeDetailScreen.kt")
          text = path.read_text()
          text = text.replace(
              "import androidx.compose.ui.relocation.BringIntoViewRequester\n",
              "import androidx.compose.foundation.relocation.BringIntoViewRequester\n"
          )
          text = text.replace(
              "import androidx.compose.ui.relocation.bringIntoViewRequester\n",
              "import androidx.compose.foundation.relocation.bringIntoViewRequester\n"
          )
          path.write_text(text)
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/phils_osophy/App.kt
          git add app/src/main/java/com/example/phils_osophy/data/local/PhilsOsophyDatabase.kt
          git add app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt
          git add app/src/main/java/com/example/phils_osophy/ui/screens/RecipeDetailScreen.kt
          if ! git diff --cached --quiet; then
            git commit -m "Fix Recipe detail keyboard visibility imports"
            git push
          fi

      - name: Assemble debug and capture result
        env:
          TMDB_READ_TOKEN: placeholder
          RAWG_API_KEY: placeholder
        run: |
          chmod +x gradlew
          set +e
          ./gradlew :app:assembleDebug > /tmp/recipe-build.log 2>&1
          status=$?
          tail -n 180 /tmp/recipe-build.log > recipe-detail-build.log
          echo "GRADLE_EXIT_CODE=$status" >> recipe-detail-build.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add recipe-detail-build.log
          if ! git diff --cached --quiet; then
            git commit -m "Record Recipe detail build result"
            git push
          fi
