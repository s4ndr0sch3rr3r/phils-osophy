name: Validate Recipe details

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/recipe-detail-screens

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Apply Recipe detail integration
        run: |
          python tools/apply_recipe_details.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/phils_osophy/App.kt
          git add app/src/main/java/com/example/phils_osophy/data/local/PhilsOsophyDatabase.kt
          git add app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt
          if ! git diff --cached --quiet; then
            git commit -m "Integrate Recipe detail navigation and persistence"
            git push
          fi

      - name: Assemble debug
        env:
          TMDB_READ_TOKEN: placeholder
          RAWG_API_KEY: placeholder
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug
