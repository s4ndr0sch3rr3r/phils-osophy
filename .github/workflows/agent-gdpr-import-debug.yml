          dialog = '''        }
    }

    importState.completionReport?.let { report ->
        AlertDialog(
            onDismissRequest = TvTimeImportManager::dismissCompletionReport,
            title = { Text("TV Time import complete") },
            text = {
                Column(
                    modifier = Modifier
                        .heightIn(max = 420.dp)
                        .verticalScroll(rememberScrollState())
                ) {
                    Text(report)
                }
            },
            confirmButton = {
                TextButton(onClick = {
                    clipboardManager.setText(AnnotatedString(report))
                }) {
                    Text("Copy")
                }
            },
            dismissButton = {
                TextButton(onClick = TvTimeImportManager::dismissCompletionReport) {
                    Text("Close")
                }
            }
        )
    }
}

