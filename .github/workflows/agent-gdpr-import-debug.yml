name: Apply GDPR import improvements

on:
  push:
    branches: [agent/gdpr-import-debug-parallel-report]

permissions:
  contents: write

jobs:
  apply-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/gdpr-import-debug-parallel-report
          fetch-depth: 0
      - name: Apply changes
        run: |
          python3 - <<'PY'
          from pathlib import Path

          p = Path('app/src/main/java/com/example/phils_osophy/data/importer/TvTimeGdprImporter.kt')
          s = p.read_text()
          s = s.replace('import android.net.Uri\n', 'import android.net.Uri\nimport android.util.Log\n')
          s = s.replace('import kotlinx.coroutines.Dispatchers\nimport kotlinx.coroutines.withContext\n', '''import kotlinx.coroutines.CancellationException
import kotlinx.coroutines.Dispatchers
import kotlinx.coroutines.async
import kotlinx.coroutines.awaitAll
import kotlinx.coroutines.coroutineScope
import kotlinx.coroutines.sync.Semaphore
import kotlinx.coroutines.sync.withPermit
import kotlinx.coroutines.withContext
''')
          s = s.replace('private const val MAX_GDPR_ENTRY_BYTES = 32 * 1024 * 1024\n', '''private const val MAX_GDPR_ENTRY_BYTES = 32 * 1024 * 1024
private const val MAX_CONCURRENT_TMDB_LOOKUPS = 4
private const val IMPORT_LOG_TAG = "TvTimeGdprImport"
''')
          start = s.index('        var importedSeriesCount = 0')
          end_marker = '''        TvTimeImportResult(
            filesRead = files.size,
            seriesImported = importedSeriesCount,
            episodesImported = importedEpisodeCount,
            moviesImported = importedMovieCount,
            skippedTitles = skippedTitles.distinct()
        )'''
          end = s.index(end_marker, start) + len(end_marker)
          replacement = '''        val seriesEntries = parsed.series.values.toList()
        val movieEntries = parsed.movies.values.toList()
        val lookupSemaphore = Semaphore(MAX_CONCURRENT_TMDB_LOOKUPS)

        Log.i(
            IMPORT_LOG_TAG,
            "Starting TMDB matching for ${seriesEntries.size} series and " +
                "${movieEntries.size} movies"
        )

        val resolvedSeries = coroutineScope {
            seriesEntries.mapIndexed { index, importedSeries ->
                async {
                    lookupSemaphore.withPermit {
                        Log.d(
                            IMPORT_LOG_TAG,
                            "Loading series ${index + 1}/${seriesEntries.size}: " +
                                importedSeries.title
                        )
                        val tmdbSeries = findSeries(importedSeries.title)
                        if (tmdbSeries == null) {
                            Log.w(IMPORT_LOG_TAG, "Series not found: ${importedSeries.title}")
                            ResolvedSeries(importedSeries, null, null)
                        } else {
                            Log.d(
                                IMPORT_LOG_TAG,
                                "Matched series ${importedSeries.title} to " +
                                    "${tmdbSeries.name} (${tmdbSeries.id})"
                            )
                            ResolvedSeries(
                                imported = importedSeries,
                                tmdb = tmdbSeries,
                                progress = expandProgressToLatestEpisode(
                                    seriesId = tmdbSeries.id,
                                    explicitEpisodes = importedSeries.episodes
                                )
                            )
                        }
                    }
                }
            }.awaitAll()
        }

        val resolvedMovies = coroutineScope {
            movieEntries.mapIndexed { index, importedMovie ->
                async {
                    lookupSemaphore.withPermit {
                        Log.d(
                            IMPORT_LOG_TAG,
                            "Loading movie ${index + 1}/${movieEntries.size}: " +
                                importedMovie.title
                        )
                        val tmdbMovie = findMovie(importedMovie.title)
                        if (tmdbMovie == null) {
                            Log.w(IMPORT_LOG_TAG, "Movie not found: ${importedMovie.title}")
                        } else {
                            Log.d(
                                IMPORT_LOG_TAG,
                                "Matched movie ${importedMovie.title} to " +
                                    "${tmdbMovie.title} (${tmdbMovie.id})"
                            )
                        }
                        ResolvedMovie(importedMovie, tmdbMovie)
                    }
                }
            }.awaitAll()
        }

        var importedSeriesCount = 0
        var importedEpisodeCount = 0
        var importedMovieCount = 0
        val skippedTitles = mutableListOf<String>()

        resolvedSeries.forEach { resolved ->
            val tmdbSeries = resolved.tmdb
            val progress = resolved.progress
            if (tmdbSeries == null || progress == null) {
                skippedTitles += resolved.imported.title
                return@forEach
            }

            val status = if (progress.isComplete) SeriesStatus.FINISHED else SeriesStatus.IN_PROGRESS
            val earliestWatchedAt = progress.episodes
                .minOfOrNull { episode -> episode.watchedAtEpochMillis }
                ?: System.currentTimeMillis()
            val existing = seriesDao.getById(tmdbSeries.id)
            if (existing == null) {
                seriesDao.insert(
                    tmdbSeries.toSavedSeriesEntity(
                        status = status,
                        addedAtEpochMillis = earliestWatchedAt
                    )
                )
            } else {
                seriesDao.updateStatus(seriesId = tmdbSeries.id, status = status.name)
            }
            if (progress.episodes.isNotEmpty()) {
                watchedEpisodeDao.markWatched(progress.episodes)
            }
            importedSeriesCount += 1
            importedEpisodeCount += progress.episodes.size
        }

        resolvedMovies.forEach { resolved ->
            val tmdbMovie = resolved.tmdb
            if (tmdbMovie == null) {
                skippedTitles += resolved.imported.title
                return@forEach
            }
            movieDao.insert(
                tmdbMovie.toSavedMovieEntity(
                    addedAtEpochMillis = resolved.imported.watchedAtEpochMillis
                        ?: System.currentTimeMillis()
                )
            )
            importedMovieCount += 1
        }

        val distinctSkippedTitles = skippedTitles.distinct()
        Log.i(
            IMPORT_LOG_TAG,
            "Import complete: $importedSeriesCount series, $importedMovieCount movies, " +
                "${distinctSkippedTitles.size} unmatched titles"
        )

        TvTimeImportResult(
            filesRead = files.size,
            seriesImported = importedSeriesCount,
            episodesImported = importedEpisodeCount,
            moviesImported = importedMovieCount,
            skippedTitles = distinctSkippedTitles
        )'''
          s = s[:start] + replacement + s[end:]
          s = s.replace('''private data class ExpandedProgress(
    val episodes: List<WatchedEpisodeEntity>,
    val isComplete: Boolean
)
''', '''private data class ExpandedProgress(
    val episodes: List<WatchedEpisodeEntity>,
    val isComplete: Boolean
)

private data class ResolvedSeries(
    val imported: GdprImportedSeries,
    val tmdb: SeriesDto?,
    val progress: ExpandedProgress?
)

private data class ResolvedMovie(
    val imported: GdprImportedMovie,
    val tmdb: MovieDto?
)
''')
          s = s.replace('''    val details = runCatching {
        TmdbClient.api.getSeriesDetails(seriesId)
    }.getOrNull()
''', '''    val details = try {
        TmdbClient.api.getSeriesDetails(seriesId)
    } catch (exception: Exception) {
        if (exception is CancellationException) throw exception
        Log.e(IMPORT_LOG_TAG, "Could not load series details for TMDB id $seriesId", exception)
        null
    }
''')
          old = '''private suspend fun findSeries(title: String): SeriesDto? {
    val results = runCatching {
        TmdbClient.api.searchSeries(query = title).results
    }.getOrDefault(emptyList())
    val normalizedRequested = normalizedTitle(title)

    return results.firstOrNull { candidate ->
        normalizedTitle(candidate.name) == normalizedRequested
    } ?: results.firstOrNull()
}

private suspend fun findMovie(title: String): MovieDto? {
    val results = runCatching {
        TmdbClient.api.searchMovies(query = title).results
    }.getOrDefault(emptyList())
    val normalizedRequested = normalizedTitle(title)

    return results.firstOrNull { candidate ->
        normalizedTitle(candidate.title) == normalizedRequested
    } ?: results.firstOrNull()
}
'''
          new = '''private suspend fun findSeries(title: String): SeriesDto? {
    val results = try {
        TmdbClient.api.searchSeries(query = title).results
    } catch (exception: Exception) {
        if (exception is CancellationException) throw exception
        Log.e(IMPORT_LOG_TAG, "Series lookup failed: $title", exception)
        emptyList()
    }
    val normalizedRequested = normalizedTitle(title)
    return results.firstOrNull { candidate ->
        normalizedTitle(candidate.name) == normalizedRequested
    } ?: results.firstOrNull()
}

private suspend fun findMovie(title: String): MovieDto? {
    val results = try {
        TmdbClient.api.searchMovies(query = title).results
    } catch (exception: Exception) {
        if (exception is CancellationException) throw exception
        Log.e(IMPORT_LOG_TAG, "Movie lookup failed: $title", exception)
        emptyList()
    }
    val normalizedRequested = normalizedTitle(title)
    return results.firstOrNull { candidate ->
        normalizedTitle(candidate.title) == normalizedRequested
    } ?: results.firstOrNull()
}
'''
          if old not in s: raise SystemExit('lookup functions changed on main')
          p.write_text(s.replace(old, new))

          Path('app/src/main/java/com/example/phils_osophy/data/importer/TvTimeImportResult.kt').write_text('''package com.example.phils_osophy.data.importer

data class TvTimeImportResult(
    val filesRead: Int,
    val seriesImported: Int,
    val episodesImported: Int,
    val moviesImported: Int,
    val skippedTitles: List<String>
) {
    fun summary(): String = if (skippedTitles.isEmpty()) {
        "Imported ${importedSummary()} from $filesRead backup files."
    } else {
        "Imported ${importedSummary()}. Could not match ${skippedTitles.size} titles."
    }

    fun completionReport(): String = buildString {
        append("Imported ${importedSummary()} from $filesRead backup files.")
        if (skippedTitles.isEmpty()) {
            append("\\n\\nAll movie and series titles were found.")
        } else {
            append("\\n\\nCould not find ${skippedTitles.size} titles:")
            skippedTitles.sortedWith(String.CASE_INSENSITIVE_ORDER).forEach { title ->
                append("\\n• $title")
            }
        }
    }

    private fun importedSummary(): String = listOf(
        "$seriesImported series",
        "$episodesImported watched episodes",
        "$moviesImported movies"
    ).joinToString(", ")
}
''')

          p = Path('app/src/main/java/com/example/phils_osophy/data/importer/TvTimeImportManager.kt')
          s = p.read_text()
          s = s.replace('    val failed: Boolean = false,\n    val completedAtEpochMillis: Long = 0\n', '    val failed: Boolean = false,\n    val completedAtEpochMillis: Long = 0,\n    val completionReport: String? = null\n')
          s = s.replace('''                TvTimeImportState(
                    message = result.summary(),
                    completedAtEpochMillis = System.currentTimeMillis()
                )''', '''                TvTimeImportState(
                    message = result.summary(),
                    completedAtEpochMillis = System.currentTimeMillis(),
                    completionReport = result.completionReport()
                )''')
          s = s[:-2] + '''

    fun dismissCompletionReport() {
        mutableState.value = mutableState.value.copy(completionReport = null)
    }
}
'''
          p.write_text(s)

          p = Path('app/src/main/java/com/example/phils_osophy/ui/screens/ProfileScreen.kt')
          s = p.read_text()
          s = s.replace('import androidx.compose.foundation.layout.Arrangement\n', 'import androidx.compose.foundation.layout.Arrangement\nimport androidx.compose.foundation.rememberScrollState\nimport androidx.compose.foundation.verticalScroll\n')
          s = s.replace('import androidx.compose.foundation.layout.height\n', 'import androidx.compose.foundation.layout.height\nimport androidx.compose.foundation.layout.heightIn\n')
          s = s.replace('import androidx.compose.material3.Button\n', 'import androidx.compose.material3.AlertDialog\nimport androidx.compose.material3.Button\n')
          s = s.replace('import androidx.compose.ui.platform.LocalContext\n', 'import androidx.compose.ui.platform.LocalClipboardManager\nimport androidx.compose.ui.platform.LocalContext\n')
          s = s.replace('import androidx.compose.ui.text.font.FontWeight\n', 'import androidx.compose.ui.text.AnnotatedString\nimport androidx.compose.ui.text.font.FontWeight\n')
          s = s.replace('    val importState by TvTimeImportManager.state.collectAsState()\n', '    val importState by TvTimeImportManager.state.collectAsState()\n    val clipboardManager = LocalClipboardManager.current\n')
          marker = '''        }
    }
}

@Composable
