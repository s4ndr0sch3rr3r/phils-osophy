name: Validate favorite icon build once

on:
  push:
    branches:
      - agent/unified-favorite-icons

permissions:
  contents: write

jobs:
  assemble-debug:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-favorite-icons
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Assemble and record result
        env:
          TMDB_READ_TOKEN: validation-placeholder
          RAWG_API_KEY: ''
        run: |
          set +e
          chmod +x gradlew
          ./gradlew :app:assembleDebug --stacktrace > /tmp/favorite-icon-build.log 2>&1
          code=$?
          echo "$code" > .github/favorite-icon-build-result.txt
          tail -n 300 /tmp/favorite-icon-build.log > .github/favorite-icon-build-log.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/favorite-icon-build-result.txt .github/favorite-icon-build-log.txt
          git commit -m "Record favorite icon build result" || true
          git push origin HEAD:agent/unified-favorite-icons
          exit $code
