name: Apply continuous library search

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

permissions:
  contents: write

jobs:
  patch-build-and-commit:
    if: github.event.pull_request.head.ref == 'agent/continuous-library-search-clear'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/continuous-library-search-clear
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Apply continuous search changes
        run: |
          python .github/scripts/apply-continuous-search.py
          rm .github/scripts/apply-continuous-search.py

      - name: Build debug APK
        env:
          TMDB_READ_TOKEN: test-token
          RAWG_API_KEY: test-key
        run: bash gradlew :app:assembleDebug

      - name: Commit feature branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/src/main/java/com/example/phils_osophy/ui/screens/MovieSearchScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt \
            .github/scripts/apply-continuous-search.py
          git commit -m "Make library searches continuous"
          git push origin HEAD:agent/continuous-library-search-clear
