name: Apply yellow rating star badges

on:
  push:
    branches:
      - agent/yellow-rating-star-badges

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/yellow-rating-star-badges
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Apply focused source changes
        run: python .github/scripts/apply_yellow_rating_star_badges.py
      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/phils_osophy/ui/screens/UserRatingComponents.kt app/src/main/java/com/example/phils_osophy/ui/screens/MovieListScreen.kt app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt
          if git diff --cached --quiet; then
            echo "No changes generated"
          else
            git commit -m "Replace rating badges with yellow stars"
            git push origin HEAD:agent/yellow-rating-star-badges
          fi
