name: Apply recipe image search v2

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  build-diagnose-once:
    if: github.head_ref == 'agent/recipe-image-search'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Apply Recipe image integration
        run: python scripts/execute_recipe_image_patch.py

      - name: Run build and capture output
        id: build
        continue-on-error: true
        env:
          TMDB_READ_TOKEN: test-token
          RAWG_API_KEY: test-key
          MEALDB_API_KEY: '1'
        shell: bash
        run: |
          set -o pipefail
          bash gradlew :app:testDebugUnitTest :app:assembleDebug 2>&1 | tee recipe-image-build-error.txt

      - name: Save build output without UI changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            echo success > recipe-image-build-error.txt
          fi
          rm .github/workflows/apply-recipe-image-search-v2.yml
          git add .github/workflows/apply-recipe-image-search-v2.yml recipe-image-build-error.txt
          git commit -m "Record Recipe image build result once"
          git push origin HEAD:${{ github.head_ref }}
