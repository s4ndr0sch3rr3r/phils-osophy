name: Apply recipe image search v2

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  patch-build-commit:
    if: github.head_ref == 'agent/recipe-image-search'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Apply Recipe image integration
        run: python scripts/execute_recipe_image_patch.py

      - name: Verify intended source diff
        run: |
          git diff --name-only > /tmp/changed-files.txt
          cat /tmp/changed-files.txt
          grep -Fx 'app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt' /tmp/changed-files.txt
          grep -Fx 'app/src/main/java/com/example/phils_osophy/ui/screens/RecipeDetailScreen.kt' /tmp/changed-files.txt
          grep -q 'MealDbClient' app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt
          grep -q 'MealDbClient' app/src/main/java/com/example/phils_osophy/ui/screens/RecipeDetailScreen.kt
          grep -q 'imageLookupSemaphore' app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt
          grep -q 'CircularProgressIndicator' app/src/main/java/com/example/phils_osophy/ui/screens/RecipeDetailScreen.kt

      - name: Run unit tests and build debug APK
        env:
          TMDB_READ_TOKEN: test-token
          RAWG_API_KEY: test-key
          MEALDB_API_KEY: '1'
        run: bash gradlew :app:testDebugUnitTest :app:assembleDebug

      - name: Commit source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/src/main/java/com/example/phils_osophy/data/remote/MealDbClient.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/RecipeDetailScreen.kt
          git commit -m "Integrate matched Recipe images"

      - name: Remove validation files
        run: |
          rm .github/workflows/apply-recipe-image-search-v2.yml
          rm scripts/execute_recipe_image_patch.py
          git add -A
          git commit -m "Remove Recipe image validation files"
          git push origin HEAD:${{ github.head_ref }}
