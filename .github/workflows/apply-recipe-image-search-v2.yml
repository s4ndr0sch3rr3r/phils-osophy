name: Apply recipe image search v2

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  patch-and-build:
    if: github.head_ref == 'agent/recipe-image-search'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Apply Recipe UI integration
        shell: python
        run: |
          from pathlib import Path
          import re

          recipe_path = Path("app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt")
          detail_path = Path("app/src/main/java/com/example/phils_osophy/ui/screens/RecipeDetailScreen.kt")
          client_path = Path("app/src/main/java/com/example/phils_osophy/data/remote/MealDbClient.kt")
          recipe = recipe_path.read_text()
          detail = detail_path.read_text()
          client = client_path.read_text()

          def replace_one(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected one match, found {count}")
              return text.replace(old, new, 1)

          def sub_one(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.DOTALL)
              if count != 1:
                  raise RuntimeError(f"{label}: expected one regex match, found {count}")
              return updated

          recipe = replace_one(
              recipe,
              "import androidx.compose.material3.Card\nimport androidx.compose.material3.MaterialTheme",
              "import androidx.compose.material3.Card\nimport androidx.compose.material3.CircularProgressIndicator\nimport androidx.compose.material3.MaterialTheme",
              "Recipe Material imports"
          )
          recipe = replace_one(
              recipe,
              "import androidx.compose.runtime.Composable\nimport androidx.compose.runtime.getValue",
              "import androidx.compose.runtime.Composable\nimport androidx.compose.runtime.LaunchedEffect\nimport androidx.compose.runtime.getValue",
              "Recipe runtime imports"
          )
          recipe = replace_one(
              recipe,
              "import androidx.compose.ui.input.nestedscroll.nestedScroll\nimport androidx.compose.ui.text.font.FontWeight",
              "import androidx.compose.ui.input.nestedscroll.nestedScroll\nimport androidx.compose.ui.layout.ContentScale\nimport androidx.compose.ui.platform.LocalContext\nimport androidx.compose.ui.text.font.FontWeight",
              "Recipe UI imports"
          )
          recipe = replace_one(
              recipe,
              "import androidx.compose.ui.unit.dp\nimport com.example.phils_osophy.data.local.RecipeStatus",
              "import androidx.compose.ui.unit.dp\nimport coil3.compose.AsyncImage\nimport coil3.request.ImageRequest\nimport coil3.request.crossfade\nimport com.example.phils_osophy.data.local.RecipeStatus",
              "Recipe Coil imports"
          )
          recipe = replace_one(
              recipe,
              "import com.example.phils_osophy.data.local.SavedRecipeEntity\nimport com.example.phils_osophy.ui.components.FavoriteIcon",
              "import com.example.phils_osophy.data.local.SavedRecipeEntity\nimport com.example.phils_osophy.data.remote.MealDbClient\nimport com.example.phils_osophy.ui.components.FavoriteIcon",
              "Recipe client import"
          )
          recipe = replace_one(
              recipe,
              "import java.util.Locale\n",
              "import java.util.Locale\nimport kotlinx.coroutines.sync.Semaphore\nimport kotlinx.coroutines.sync.withPermit\n",
              "Recipe coroutine imports"
          )

          recipe = sub_one(
              recipe,
              r'''    var query by remember \{ mutableStateOf\(""\) \}\n.*?    val expandedSections = remember \{\n        mutableStateMapOf<String, Boolean>\(\)\n    \}\n''',
              '''    var query by remember { mutableStateOf("") }
              var searchedQuery by remember { mutableStateOf<String?>(null) }
              var searchResults by remember {
                  mutableStateOf<List<RecipeSearchResult>>(emptyList())
              }
              var isSearching by remember { mutableStateOf(false) }
              var searchError by remember { mutableStateOf<String?>(null) }
              var showFavoritesOnly by remember { mutableStateOf(false) }
              var isSearchBarVisible by remember { mutableStateOf(true) }
              var pendingRecipe by remember {
                  mutableStateOf<RecipeSearchResult?>(null)
              }
              val recipeImageUrls = remember {
                  mutableStateMapOf<String, String?>()
              }
              val imageLookupSemaphore = remember { Semaphore(permits = 4) }
              val expandedSections = remember {
                  mutableStateMapOf<String, Boolean>()
              }
          ''',
              "Recipe state"
          )

          saved_keys = (
              "    val savedRecipeKeys = remember(allRecipes) {\n"
              "        allRecipes.map { recipe -> recipe.key }.toSet()\n"
              "    }\n"
          )
          recipe = replace_one(
              recipe,
              saved_keys,
              saved_keys + '''
              LaunchedEffect(savedRecipeKeys) {
                  recipeImageUrls.keys
                      .filter { recipeKey -> recipeKey !in savedRecipeKeys }
                      .forEach { staleKey -> recipeImageUrls.remove(staleKey) }
              }

              LaunchedEffect(searchedQuery) {
                  val activeQuery = searchedQuery ?: return@LaunchedEffect
                  val localResult = RecipeSearchResult(
                      key = "local:${activeQuery.lowercase(Locale.ROOT)}",
                      title = activeQuery,
                      imageUrl = null
                  )

                  isSearching = true
                  searchError = null
                  try {
                      val remoteResults = MealDbClient.searchMeals(activeQuery)
                          .map { meal ->
                              RecipeSearchResult(
                                  key = "mealdb:${meal.id}",
                                  title = meal.name.trim(),
                                  imageUrl = meal.thumbnailUrl
                              )
                          }
                      searchResults = remoteResults.ifEmpty { listOf(localResult) }
                  } catch (_: Exception) {
                      searchError =
                          "Recipe images could not be loaded. You can still add the entered title."
                      searchResults = listOf(localResult)
                  } finally {
                      isSearching = false
                  }
              }
          ''',
              "Recipe effects"
          )

          recipe = sub_one(
              recipe,
              r'''    fun performSearch\(\) \{.*?    fun resetSearch\(\) \{.*?    \}\n''',
              '''    fun performSearch() {
                  searchedQuery = query.trim()
                      .replace(Regex("\\s+"), " ")
                      .takeIf { title -> title.isNotBlank() }
              }

              fun resetSearch() {
                  searchedQuery = null
                  searchResults = emptyList()
                  searchError = null
                  isSearching = false
              }
          ''',
              "Recipe search functions"
          )

          recipe = replace_one(
              recipe,
              "        if (searchedTitle == null) {",
              "        if (searchedQuery == null) {",
              "Recipe search condition"
          )

          old_section_call = (
              "                    onRecipeClick = onRecipeClick,\n"
              "                    onFavoriteClick = onFavoriteClick\n"
              "                )"
          )
          new_section_call = (
              "                    onRecipeClick = onRecipeClick,\n"
              "                    onFavoriteClick = onFavoriteClick,\n"
              "                    imageUrls = recipeImageUrls,\n"
              "                    imageLookupSemaphore = imageLookupSemaphore\n"
              "                )"
          )
          if recipe.count(old_section_call) != 4:
              raise RuntimeError(f"Recipe section calls: expected four, found {recipe.count(old_section_call)}")
          recipe = recipe.replace(old_section_call, new_section_call)

          recipe = sub_one(
              recipe,
              r'''        \} else \{\n            val title = searchedTitle\.orEmpty\(\).*?    pendingRecipeTitle\?\.let \{ title ->.*?    \}\n\n\}''',
              '''        } else {
                  LazyColumn(
                      modifier = Modifier
                          .weight(1f)
                          .fillMaxWidth(),
                      contentPadding = PaddingValues(bottom = 16.dp),
                      verticalArrangement = Arrangement.spacedBy(10.dp)
                  ) {
                      if (isSearching) {
                          item(key = "recipe-search-loading") {
                              Box(
                                  modifier = Modifier
                                      .fillMaxWidth()
                                      .height(96.dp),
                                  contentAlignment = Alignment.Center
                              ) {
                                  CircularProgressIndicator()
                              }
                          }
                      }

                      searchError?.let { message ->
                          item(key = "recipe-search-error") {
                              Text(
                                  text = message,
                                  color = MaterialTheme.colorScheme.error,
                                  style = MaterialTheme.typography.bodySmall
                              )
                          }
                      }

                      searchResults.forEach { result ->
                          item(key = result.key) {
                              RecipeSearchResultCard(
                                  result = result,
                                  isAdded = result.title
                                      .trim()
                                      .lowercase(Locale.ROOT) in savedRecipeKeys,
                                  onAddClick = { pendingRecipe = result }
                              )
                          }
                      }
                  }
              }
              }

              pendingRecipe?.let { result ->
                  RecipeAddDialog(
                      title = result.title,
                      onAdd = { status ->
                          onAddRecipe(result.title, status)
                          result.imageUrl?.let { imageUrl ->
                              recipeImageUrls[
                                  result.title.trim().lowercase(Locale.ROOT)
                              ] = imageUrl
                          }
                          pendingRecipe = null
                          query = ""
                          resetSearch()
                      },
                      onCancel = { pendingRecipe = null }
                  )
              }

          }''',
              "Recipe search results and dialog"
          )

          old_signature = (
              "private fun LazyListScope.recipeSectionItems(\n"
              "    title: String,\n"
              "    recipes: List<SavedRecipeEntity>,\n"
              "    isExpanded: Boolean,\n"
              "    onToggleExpanded: () -> Unit,\n"
              "    onRecipeClick: (String) -> Unit,\n"
              "    onFavoriteClick: (recipeKey: String, isFavorite: Boolean) -> Unit\n"
              ") {"
          )
          new_signature = (
              "private fun LazyListScope.recipeSectionItems(\n"
              "    title: String,\n"
              "    recipes: List<SavedRecipeEntity>,\n"
              "    isExpanded: Boolean,\n"
              "    onToggleExpanded: () -> Unit,\n"
              "    onRecipeClick: (String) -> Unit,\n"
              "    onFavoriteClick: (recipeKey: String, isFavorite: Boolean) -> Unit,\n"
              "    imageUrls: MutableMap<String, String?>,\n"
              "    imageLookupSemaphore: Semaphore\n"
              ") {"
          )
          recipe = replace_one(recipe, old_signature, new_signature, "Recipe section signature")

          card_call = (
              "                        RecipeCard(\n"
              "                            recipe = recipe,\n"
          )
          card_call_updated = (
              "                        RecipeCard(\n"
              "                            recipe = recipe,\n"
              "                            imageUrls = imageUrls,\n"
              "                            imageLookupSemaphore = imageLookupSemaphore,\n"
          )
          if recipe.count(card_call) != 2:
              raise RuntimeError(f"Recipe card calls: expected two, found {recipe.count(card_call)}")
          recipe = recipe.replace(card_call, card_call_updated)

          recipe = sub_one(
              recipe,
              r'''@Composable\nprivate fun RecipeCard\(.*?\n\}\n\n@Composable\nprivate fun RecipeSearchResult\(''',
              '''@Composable
          private fun RecipeCard(
              recipe: SavedRecipeEntity,
              imageUrls: MutableMap<String, String?>,
              imageLookupSemaphore: Semaphore,
              onClick: () -> Unit,
              onFavoriteClick: () -> Unit
          ) {
              val isImageResolved = imageUrls.containsKey(recipe.key)
              val imageUrl = imageUrls[recipe.key]

              LaunchedEffect(recipe.key, recipe.title) {
                  if (!imageUrls.containsKey(recipe.key)) {
                      imageUrls[recipe.key] = imageLookupSemaphore.withPermit {
                          runCatching {
                              MealDbClient.findClosestMeal(recipe.title)?.thumbnailUrl
                          }.getOrNull()
                      }
                  }
              }

              Column(modifier = Modifier.width(104.dp)) {
                  Card(
                      modifier = Modifier
                          .size(104.dp)
                          .clickable(onClick = onClick)
                  ) {
                      Box(
                          modifier = Modifier
                              .fillMaxSize()
                              .background(MaterialTheme.colorScheme.surfaceVariant),
                          contentAlignment = Alignment.Center
                      ) {
                          when {
                              !imageUrl.isNullOrBlank() -> {
                                  AsyncImage(
                                      model = ImageRequest.Builder(LocalContext.current)
                                          .data(imageUrl)
                                          .crossfade(true)
                                          .build(),
                                      contentDescription = "${recipe.title} image",
                                      modifier = Modifier.fillMaxSize(),
                                      contentScale = ContentScale.Crop
                                  )
                              }

                              !isImageResolved -> {
                                  CircularProgressIndicator(
                                      modifier = Modifier.size(22.dp),
                                      strokeWidth = 2.dp
                                  )
                              }

                              else -> {
                                  Text(
                                      text = recipe.title.take(1).uppercase(),
                                      style = MaterialTheme.typography.headlineMedium,
                                      color = MaterialTheme.colorScheme.onSurfaceVariant
                                  )
                              }
                          }

                          FavoriteIcon(
                              isFavorite = recipe.isFavorite,
                              modifier = Modifier
                                  .align(Alignment.TopStart)
                                  .padding(6.dp)
                                  .background(
                                      color = Color.Black.copy(alpha = 0.65f),
                                      shape = RoundedCornerShape(50)
                                  )
                                  .clickable(onClick = onFavoriteClick)
                                  .padding(horizontal = 7.dp, vertical = 3.dp),
                              size = 20.dp,
                              activeColor = RecipeFavoriteColor,
                              inactiveColor = Color.White
                          )
                      }
                  }
                  MediaCardTitle(title = recipe.title)
              }
          }

          private data class RecipeSearchResult(
              val key: String,
              val title: String,
              val imageUrl: String?
          )

          @Composable
          private fun RecipeSearchResultCard(''',
              "Recipe card implementation"
          )

          recipe = sub_one(
              recipe,
              r'''private fun RecipeSearchResultCard\(.*?\n\}\n\n@Composable\nprivate fun RecipeAddDialog''',
              '''private fun RecipeSearchResultCard(
              result: RecipeSearchResult,
              isAdded: Boolean,
              onAddClick: () -> Unit
          ) {
              Card(modifier = Modifier.fillMaxWidth()) {
                  Row(
                      modifier = Modifier.padding(12.dp),
                      verticalAlignment = Alignment.CenterVertically,
                      horizontalArrangement = Arrangement.spacedBy(12.dp)
                  ) {
                      Box(
                          modifier = Modifier
                              .size(88.dp)
                              .background(MaterialTheme.colorScheme.surfaceVariant),
                          contentAlignment = Alignment.Center
                      ) {
                          if (!result.imageUrl.isNullOrBlank()) {
                              AsyncImage(
                                  model = ImageRequest.Builder(LocalContext.current)
                                      .data(result.imageUrl)
                                      .crossfade(true)
                                      .build(),
                                  contentDescription = "${result.title} image",
                                  modifier = Modifier.fillMaxSize(),
                                  contentScale = ContentScale.Crop
                              )
                          }
                      }
                      Text(
                          text = result.title,
                          modifier = Modifier.weight(1f),
                          style = MaterialTheme.typography.titleMedium,
                          maxLines = 3,
                          overflow = TextOverflow.Ellipsis
                      )
                      Button(
                          onClick = onAddClick,
                          enabled = !isAdded
                      ) {
                          Text(if (isAdded) "Added" else "Add")
                      }
                  }
              }
          }

          @Composable
          private fun RecipeAddDialog''',
              "Recipe search card"
          )

          detail = replace_one(
              detail,
              "import androidx.compose.material3.Button\nimport androidx.compose.material3.DropdownMenu",
              "import androidx.compose.material3.Button\nimport androidx.compose.material3.CircularProgressIndicator\nimport androidx.compose.material3.DropdownMenu",
              "Detail Material imports"
          )
          detail = replace_one(
              detail,
              "import androidx.compose.runtime.Composable\nimport androidx.compose.runtime.getValue",
              "import androidx.compose.runtime.Composable\nimport androidx.compose.runtime.LaunchedEffect\nimport androidx.compose.runtime.getValue",
              "Detail runtime imports"
          )
          detail = replace_one(
              detail,
              "import com.example.phils_osophy.data.local.SavedRecipeEntity\nimport com.example.phils_osophy.ui.components.FavoriteIcon",
              "import com.example.phils_osophy.data.local.SavedRecipeEntity\nimport com.example.phils_osophy.data.remote.MealDbClient\nimport com.example.phils_osophy.ui.components.FavoriteIcon",
              "Detail client import"
          )
          detail = sub_one(
              detail,
              r'''    val coroutineScope = rememberCoroutineScope\(\)\n    val imageUrl = remember\(recipe\.key\) \{.*?    \}\n''',
              '''    val coroutineScope = rememberCoroutineScope()
              var imageUrl by remember(recipe.key) { mutableStateOf<String?>(null) }
              var isImageLoading by remember(recipe.key) { mutableStateOf(true) }

              LaunchedEffect(recipe.key, recipe.title) {
                  isImageLoading = true
                  imageUrl = runCatching {
                      MealDbClient.findClosestMeal(recipe.title)?.thumbnailUrl
                  }.getOrNull()
                  isImageLoading = false
              }
          ''',
              "Detail image state"
          )
          detail = sub_one(
              detail,
              r'''            AsyncImage\(.*?            \)\n\n            Box\(''',
              '''            if (!imageUrl.isNullOrBlank()) {
                          AsyncImage(
                              model = ImageRequest.Builder(LocalContext.current)
                                  .data(imageUrl)
                                  .crossfade(true)
                                  .build(),
                              contentDescription = "${recipe.title} image",
                              modifier = Modifier.fillMaxSize(),
                              contentScale = ContentScale.Crop
                          )
                      } else {
                          Box(
                              modifier = Modifier
                                  .fillMaxSize()
                                  .background(MaterialTheme.colorScheme.surfaceVariant),
                              contentAlignment = Alignment.Center
                          ) {
                              if (isImageLoading) {
                                  CircularProgressIndicator()
                              } else {
                                  Text(
                                      text = recipe.title,
                                      modifier = Modifier.padding(24.dp),
                                      style = MaterialTheme.typography.headlineMedium,
                                      color = MaterialTheme.colorScheme.onSurfaceVariant
                                  )
                              }
                          }
                      }

                      Box(''',
              "Detail hero image"
          )

          client = client.replace(
              'Regex("""\\s*[\\[(][^\\])]+[\\])]\\s*$""")',
              'Regex("""\\s*(?:\\([^)]*\\)|\\[[^]]*])\\s*$""")'
          )

          recipe_path.write_text(recipe)
          detail_path.write_text(detail)
          client_path.write_text(client)

      - name: Run unit tests and build debug APK
        env:
          TMDB_READ_TOKEN: test-token
          RAWG_API_KEY: test-key
          MEALDB_API_KEY: '1'
        run: bash gradlew :app:testDebugUnitTest :app:assembleDebug

      - name: Commit validated changes
        run: |
          rm -f .github/workflows/apply-recipe-image-search.yml
          rm -f .github/workflows/apply-recipe-image-search-v2.yml
          rm -f recipe-image-patch-diagnostics.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Load matched images for Recipes"
          git push origin HEAD:${{ github.head_ref }}
