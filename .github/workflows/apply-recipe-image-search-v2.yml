name: Apply recipe image search v2

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  persist-validated-sources:
    if: github.head_ref == 'agent/recipe-image-search'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply validated Recipe image integration
        run: python scripts/execute_recipe_image_patch.py

      - name: Verify and commit source changes
        run: |
          git diff --name-only > /tmp/changed-files.txt
          grep -Fx 'app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt' /tmp/changed-files.txt
          grep -Fx 'app/src/main/java/com/example/phils_osophy/ui/screens/RecipeDetailScreen.kt' /tmp/changed-files.txt
          grep -q 'imageLookupSemaphore' app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/src/main/java/com/example/phils_osophy/data/remote/MealDbClient.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/RecipeDetailScreen.kt
          git commit -m "Integrate matched Recipe images"

      - name: Remove temporary files and push
        run: |
          rm -f .github/workflows/apply-recipe-image-search-v2.yml
          rm -f scripts/execute_recipe_image_patch.py
          rm -f recipe-image-validation-trigger.txt
          rm -f recipe-image-isolated-error.txt
          rm -f recipe-image-final-error.txt
          rm -f recipe-image-patch-error-once.txt
          rm -f recipe-image-latest-error.txt
          rm -f recipe-image-build-error.txt
          git add -A
          git commit -m "Remove Recipe image validation files"
          git push origin HEAD:${{ github.head_ref }}
