name: Apply recipe image search v2

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/recipe-image-search'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Run patch executor
        id: patch
        continue-on-error: true
        run: python scripts/execute_recipe_image_patch.py > recipe-image-final-error.txt 2>&1

      - name: Save traceback
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.patch.outcome }}" = "success" ]; then
            echo success > recipe-image-final-error.txt
          fi
          git add recipe-image-final-error.txt
          git commit -m "Record final Recipe image executor result"
          git push origin HEAD:${{ github.head_ref }}
