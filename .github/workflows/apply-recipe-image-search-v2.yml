name: Apply recipe image search v2

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  fix-and-build:
    if: github.head_ref == 'agent/recipe-image-search'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Fix Kotlin whitespace regex
        shell: python
        run: |
          from pathlib import Path
          path = Path("app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt")
          text = path.read_text()
          old = 'Regex("\\s+")'
          new = 'Regex("\\\\s+")'
          if text.count(old) != 1:
              raise RuntimeError(f"Expected one invalid regex, found {text.count(old)}")
          path.write_text(text.replace(old, new, 1))

      - name: Run unit tests and debug build
        id: build
        continue-on-error: true
        env:
          TMDB_READ_TOKEN: test-token
          RAWG_API_KEY: test-key
          MEALDB_API_KEY: '1'
        shell: bash
        run: |
          set -o pipefail
          bash gradlew :app:testDebugUnitTest :app:assembleDebug 2>&1 | tee recipe-image-definitive-build.txt

      - name: Commit result and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ "${{ steps.build.outcome }}" = "success" ]; then
            rm -f recipe-image-definitive-build.txt
          fi
          rm .github/workflows/apply-recipe-image-search-v2.yml
          git add -A
          git commit -m "Fix Recipe image search normalization"
          git push origin HEAD:${{ github.head_ref }}
