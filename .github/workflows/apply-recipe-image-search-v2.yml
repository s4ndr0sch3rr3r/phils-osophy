name: Apply recipe image search v2

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  patch-and-build:
    if: github.head_ref == 'agent/recipe-image-search'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Apply Recipe image integration
        run: python scripts/execute_recipe_image_patch.py

      - name: Run unit tests and build debug APK
        env:
          TMDB_READ_TOKEN: test-token
          RAWG_API_KEY: test-key
          MEALDB_API_KEY: '1'
        run: bash gradlew :app:testDebugUnitTest :app:assembleDebug

      - name: Commit validated changes
        run: |
          rm -f .github/workflows/apply-recipe-image-search.yml
          rm -f .github/workflows/apply-recipe-image-search-v2.yml
          rm -f .github/workflows/execute-recipe-image-patch.yml
          rm -f .github/workflows/fix-recipe-image-v2.yml
          rm -f recipe-image-patch-diagnostics.txt
          rm -f recipe-image-v2-diagnostics.txt
          rm -f recipe-image-trigger.txt
          rm -f scripts/execute_recipe_image_patch.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Load matched images for Recipes"
          git push origin HEAD:${{ github.head_ref }}
