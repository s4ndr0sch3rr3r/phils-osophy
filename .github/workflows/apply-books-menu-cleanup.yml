name: Apply books menu cleanup

on:
  push:
    branches:
      - agent/series-full-category-list
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch-books-menu:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/series-full-category-list
          fetch-depth: 0

      - name: Remove the top-level Books back button
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path("app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt")
          text = path.read_text(encoding="utf-8")
          pattern = re.compile(
              r'^        TextButton\(onClick = onBackClick\) \{\n'
              r'            Text\("← Back"\)\n'
              r'        \}\n\n',
              flags=re.MULTILINE,
          )
          updated, count = pattern.subn("", text, count=1)
          if count != 1:
              raise SystemExit("Top-level Books back-button block was not found")
          path.write_text(updated, encoding="utf-8")

      - name: Commit the Books cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt
          git commit -m "Remove books menu back button"
          git push origin HEAD:agent/series-full-category-list
