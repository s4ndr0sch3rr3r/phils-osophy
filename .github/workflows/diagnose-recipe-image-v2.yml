name: Diagnose recipe image v2

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'agent/recipe-image-search'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Check regex anchors
        shell: python
        run: |
          from pathlib import Path
          import re

          recipe = Path("app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt").read_text()
          detail = Path("app/src/main/java/com/example/phils_osophy/ui/screens/RecipeDetailScreen.kt").read_text()
          patterns = {
              "state": (recipe, r'''    var query by remember \{ mutableStateOf\(""\) \}\n.*?    val expandedSections = remember \{\n        mutableStateMapOf<String, Boolean>\(\)\n    \}\n'''),
              "search functions": (recipe, r'''    fun performSearch\(\) \{.*?    fun resetSearch\(\) \{.*?    \}\n'''),
              "search result block": (recipe, r'''        \} else \{\n            val title = searchedTitle\.orEmpty\(\).*?    pendingRecipeTitle\?\.let \{ title ->.*?    \}\n\n\}'''),
              "card implementation": (recipe, r'''@Composable\nprivate fun RecipeCard\(.*?\n\}\n\n@Composable\nprivate fun RecipeSearchResult\('''),
              "search card": (recipe, r'''@Composable\nprivate fun RecipeSearchResult\(.*?\n\}\n\n@Composable\nprivate fun RecipeAddDialog'''),
              "detail state": (detail, r'''    val coroutineScope = rememberCoroutineScope\(\)\n    val imageUrl = remember\(recipe\.key\) \{.*?    \}\n'''),
              "detail hero": (detail, r'''            AsyncImage\(.*?            \)\n\n            Box\('''),
          }
          lines = []
          for name, (text, pattern) in patterns.items():
              lines.append(f"{name}: {len(re.findall(pattern, text, flags=re.DOTALL))}")
          lines.append(f"section call string: {recipe.count('                    onFavoriteClick = onFavoriteClick\\n                )')}")
          lines.append(f"card call string: {recipe.count('                        RecipeCard(\\n                            recipe = recipe,\\n')}")
          Path("recipe-image-v2-diagnostics.txt").write_text("\n".join(lines) + "\n")

      - name: Commit diagnostics
        run: |
          rm .github/workflows/diagnose-recipe-image-v2.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Record Recipe image v2 diagnostics"
          git push origin HEAD:${{ github.head_ref }}
