name: Apply library header counts

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-library-header-counts.yml

permissions:
  contents: write

jobs:
  patch-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/library-header-counts
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Add memoized library counts
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"Expected one match in {path}, found {count}")
              file.write_text(text.replace(old, new, 1))

          screens = "app/src/main/java/com/example/phils_osophy/ui/screens"

          replace_once(
              f"{screens}/SeriesLibraryScreen.kt",
              '''    val allSavedSeries = (
                  inProgressSeries +
                      finishedSeries +
                      toWatchSeries +
                      stoppedSeries
                  ).distinctBy { series -> series.id }
              val savedSeriesIds = allSavedSeries
                  .map { series -> series.id }
                  .toSet()
          ''',
              '''    val allSavedSeries = remember(
                  inProgressSeries,
                  finishedSeries,
                  toWatchSeries,
                  stoppedSeries
              ) {
                  (
                      inProgressSeries +
                          finishedSeries +
                          toWatchSeries +
                          stoppedSeries
                      ).distinctBy { series -> series.id }
              }
              val savedSeriesIds = remember(allSavedSeries) {
                  allSavedSeries.map { series -> series.id }.toSet()
              }
          '''
          )
          replace_once(
              f"{screens}/SeriesLibraryScreen.kt",
              '                text = "Series",',
              '                text = "Series (${allSavedSeries.size})",'
          )

          replace_once(
              f"{screens}/MovieSearchScreen.kt",
              '''    val savedMovieIds = savedMovies
                  .map { movie -> movie.id }
                  .toSet()
              val favoriteMovies = savedMovies.filter { movie ->
                  movie.isFavorite
              }
          ''',
              '''    val savedMovieIds = remember(savedMovies) {
                  savedMovies.map { movie -> movie.id }.toSet()
              }
              val favoriteMovies = remember(savedMovies) {
                  savedMovies.filter { movie -> movie.isFavorite }
              }
          '''
          )
          replace_once(
              f"{screens}/MovieSearchScreen.kt",
              '                text = "Movies",',
              '                text = "Movies (${savedMovies.size})",'
          )

          replace_once(
              f"{screens}/BooksMenuScreen.kt",
              '''    val allSavedBooks = (
                  inProgressBooks +
                      finishedBooks +
                      toReadBooks +
                      abandonedBooks
                  ).distinctBy { book -> book.key }
              val savedBookKeys = allSavedBooks
                  .map { book -> book.key }
                  .toSet()
          ''',
              '''    val allSavedBooks = remember(
                  inProgressBooks,
                  finishedBooks,
                  toReadBooks,
                  abandonedBooks
              ) {
                  (
                      inProgressBooks +
                          finishedBooks +
                          toReadBooks +
                          abandonedBooks
                      ).distinctBy { book -> book.key }
              }
              val savedBookKeys = remember(allSavedBooks) {
                  allSavedBooks.map { book -> book.key }.toSet()
              }
          '''
          )
          replace_once(
              f"{screens}/BooksMenuScreen.kt",
              '                text = "Books",',
              '                text = "Books (${allSavedBooks.size})",'
          )

          replace_once(
              f"{screens}/GameLibraryScreen.kt",
              '            text = "Games",',
              '            text = "Games (${games.size})",'
          )

          replace_once(
              f"{screens}/RecipeLibraryScreen.kt",
              '                text = "Recipes",',
              '                text = "Recipes (${allRecipes.size})",'
          )

      - name: Build debug APK
        env:
          TMDB_READ_TOKEN: test-token
          RAWG_API_KEY: test-key
        run: ./gradlew :app:assembleDebug

      - name: Commit branch changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/MovieSearchScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/GameLibraryScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/RecipeLibraryScreen.kt
          git commit -m "Display saved item counts in library headers"
          git push origin HEAD:agent/library-header-counts
