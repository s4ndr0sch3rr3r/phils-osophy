name: Validate detail page manage menus once

on:
  push:
    branches:
      - agent/detail-page-manage-menus

permissions:
  contents: write

jobs:
  assemble-debug:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/detail-page-manage-menus
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - name: Assemble and record result
        env:
          TMDB_READ_TOKEN: validation-placeholder
          RAWG_API_KEY: ''
        run: |
          set +e
          bash ./gradlew :app:assembleDebug --stacktrace > /tmp/detail-menu-build.log 2>&1
          code=$?
          echo "$code" > .github/detail-menu-build-result.txt
          tail -n 250 /tmp/detail-menu-build.log > .github/detail-menu-build-log.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/detail-menu-build-result.txt .github/detail-menu-build-log.txt
          git commit -m "Record detail menu build result" || true
          git push origin HEAD:agent/detail-page-manage-menus
          exit $code
