name: Validate local-first library search

on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: write

jobs:
  patch-build-and-commit:
    if: github.head_ref == 'agent/local-first-library-search'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/local-first-library-search
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Patch Series and Books search screens
        shell: bash
        run: |
          echo '' | base64 -d | gzip -d > /tmp/patch.py
          python /tmp/patch.py

      - name: Build debug APK
        env:
          TMDB_READ_TOKEN: test-token
          RAWG_API_KEY: test-key
        run: ./gradlew :app:assembleDebug

      - name: Commit validated search changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/apply-local-first-search.yml
          git add \
            app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt
          git commit -m "Search Series and Books locally before remote APIs"
          git push origin HEAD:agent/local-first-library-search
