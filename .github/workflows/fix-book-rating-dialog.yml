name: Fix book rating dialog placement

on:
  push:
    branches:
      - agent/add-ratings-all-media
    paths:
      - .github/scripts/fix_book_rating_dialog.py
      - .github/workflows/fix-book-rating-dialog.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-ratings-all-media
          fetch-depth: 0
      - run: python .github/scripts/fix_book_rating_dialog.py
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Fix book rating dialog placement"
          git push origin HEAD:agent/add-ratings-all-media
