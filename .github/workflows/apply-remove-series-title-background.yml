name: Remove Series title background

on:
  push:
    branches:
      - agent/remove-series-title-background

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/remove-series-title-background
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python .github/scripts/remove_series_title_background.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt
          git commit -m "Remove Series title card background"
          git push
