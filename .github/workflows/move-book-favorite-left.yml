name: Move book favorite to top left

on:
  push:
    branches:
      - agent/book-favorite-top-left

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/book-favorite-top-left
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python .github/scripts/move_book_favorite_left.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt
          git commit -m "Move book favorite button to top left"
          git push
