name: Sync library header counts branch

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  sync:
    if: github.head_ref == 'agent/library-header-counts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Merge current main and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --no-edit
          rm .github/workflows/sync-library-header-counts.yml
          git add -A
          git commit -m "Remove temporary branch sync workflow"
          git push origin HEAD:${{ github.head_ref }}
