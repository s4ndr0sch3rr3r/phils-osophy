name: Open saved search results

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  format-build-commit:
    if: github.head_ref == 'agent/open-saved-search-results'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Format saved result card modifiers
        shell: python
        run: |
          from pathlib import Path

          paths = [
              Path('app/src/main/java/com/example/phils_osophy/ui/screens/MovieSearchScreen.kt'),
              Path('app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt'),
              Path('app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt'),
          ]
          malformed = '''    Card(
          modifier = Modifier
              .fillMaxWidth()
              .then(
                  if (onImageClick != null) {
                      Modifier.clickable(onClick = onImageClick)
                  } else {
                      Modifier
                  }
              )
      ) {'''
          formatted = '''    Card(
              modifier = Modifier
                  .fillMaxWidth()
                  .then(
                      if (onImageClick != null) {
                          Modifier.clickable(onClick = onImageClick)
                      } else {
                          Modifier
                      }
                  )
          ) {'''

          for path in paths:
              text = path.read_text()
              count = text.count(malformed)
              if count != 1:
                  raise RuntimeError(
                      f'Expected one malformed block in {path}, found {count}'
                  )
              path.write_text(text.replace(malformed, formatted, 1))

      - name: Verify library-only navigation
        run: |
          grep -q 'onMovieClick(movie.id)' app/src/main/java/com/example/phils_osophy/ui/screens/MovieSearchScreen.kt
          grep -q 'onSeriesClick(series.id)' app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt
          grep -q 'onBookClick(book.key)' app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt

      - name: Run tests and debug build
        env:
          TMDB_READ_TOKEN: test-token
          RAWG_API_KEY: test-key
          MEALDB_API_KEY: '1'
        run: bash gradlew :app:testDebugUnitTest :app:assembleDebug

      - name: Commit formatting and remove workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/src/main/java/com/example/phils_osophy/ui/screens/MovieSearchScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt
          git commit -m "Format saved search result navigation"
          rm .github/workflows/open-saved-search-results.yml
          git add -A
          git commit -m "Remove saved search formatting validator"
          git push origin HEAD:${{ github.head_ref }}
