name: Open saved search results

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  patch-build-commit:
    if: github.head_ref == 'agent/open-saved-search-results'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make saved search result cards open details
        shell: python
        run: |
          from pathlib import Path

          files = [
              (
                  Path('app/src/main/java/com/example/phils_osophy/ui/screens/MovieSearchScreen.kt'),
                  'private fun MovieResultCard(',
                  '\n@Composable\nprivate fun MoviePoster('
              ),
              (
                  Path('app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt'),
                  'private fun LibrarySearchResult(',
                  '\n@Composable\nprivate fun LibraryAddDialog('
              ),
              (
                  Path('app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt'),
                  'private fun BookSearchResult(',
                  '\n@Composable\nprivate fun BookAddDialog('
              ),
          ]

          old_multiline_card = '''    Card(
              modifier = Modifier.fillMaxWidth()
          ) {'''
          old_inline_card = '    Card(modifier = Modifier.fillMaxWidth()) {'
          new_card = '''    Card(
              modifier = Modifier
                  .fillMaxWidth()
                  .then(
                      if (onImageClick != null) {
                          Modifier.clickable(onClick = onImageClick)
                      } else {
                          Modifier
                      }
                  )
          ) {'''

          for path, start_marker, end_marker in files:
              text = path.read_text()
              start = text.index(start_marker)
              end = text.index(end_marker, start)
              block = text[start:end]

              if old_multiline_card in block:
                  updated = block.replace(old_multiline_card, new_card, 1)
              elif old_inline_card in block:
                  updated = block.replace(old_inline_card, new_card, 1)
              else:
                  raise RuntimeError(f'Could not find result card in {path}')

              if updated == block:
                  raise RuntimeError(f'No change made in {path}')
              if 'if (onImageClick != null)' not in updated:
                  raise RuntimeError(f'Missing saved-only click guard in {path}')

              path.write_text(text[:start] + updated + text[end:])

      - name: Verify navigation remains library-only
        run: |
          for file in \
            app/src/main/java/com/example/phils_osophy/ui/screens/MovieSearchScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt; do
            grep -q 'Modifier.clickable(onClick = onImageClick)' "$file"
          done
          grep -q 'onMovieClick(movie.id)' app/src/main/java/com/example/phils_osophy/ui/screens/MovieSearchScreen.kt
          grep -q 'onSeriesClick(series.id)' app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt
          grep -q 'onBookClick(book.key)' app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt

      - name: Run tests and debug build
        env:
          TMDB_READ_TOKEN: test-token
          RAWG_API_KEY: test-key
          MEALDB_API_KEY: '1'
        run: bash gradlew :app:testDebugUnitTest :app:assembleDebug

      - name: Commit validated source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            app/src/main/java/com/example/phils_osophy/ui/screens/MovieSearchScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt \
            app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt
          git commit -m "Open saved search results from their cards"

      - name: Remove validation workflow and push
        run: |
          rm .github/workflows/open-saved-search-results.yml
          git add -A
          git commit -m "Remove saved search navigation validator"
          git push origin HEAD:${{ github.head_ref }}
