name: Apply media rating badge layout

on:
  push:
    branches:
      - agent/restore-media-rating-badges

permissions:
  contents: write

jobs:
  apply-rating-badges:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/restore-media-rating-badges

      - name: Restore and align rating badges
        run: |
          python3 - <<'PY'
          from pathlib import Path

          movie_path = Path("app/src/main/java/com/example/phils_osophy/ui/screens/MovieListScreen.kt")
          movie = movie_path.read_text(encoding="utf-8")
          movie = movie.replace(
              'private val RatingBadgeColor = Color(0xFFD32F2F)\n',
              '',
              1,
          )
          old_movie_badge = '''            if (movie.userRating in 1..10) {
                          Box(
                              modifier = Modifier
                                  .align(Alignment.TopEnd)
                                  .padding(6.dp)
                                  .size(30.dp)
                                  .clip(CircleShape)
                                  .background(RatingBadgeColor),
                              contentAlignment = Alignment.Center
                          ) {
                              Text(
                                  text = movie.userRating.toString(),
                                  color = Color.White,
                                  style = MaterialTheme.typography.labelLarge,
                                  fontWeight = FontWeight.Bold
                              )
                          }
                      }
          '''
          new_movie_badge = '''            UserRatingBadge(
                          rating = movie.userRating,
                          modifier = Modifier
                              .align(Alignment.TopEnd)
                              .padding(6.dp)
                      )
          '''
          if old_movie_badge not in movie:
              raise SystemExit("Movie rating badge block was not found")
          movie = movie.replace(old_movie_badge, new_movie_badge, 1)
          movie_path.write_text(movie, encoding="utf-8")

          series_path = Path("app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt")
          series = series_path.read_text(encoding="utf-8")
          old_series_badge = '''                UserRatingBadge(
                          rating = series.userRating,
                          modifier = Modifier
                              .align(Alignment.BottomEnd)
                              .padding(6.dp)
                      )
          '''
          new_series_badge = '''                UserRatingBadge(
                          rating = series.userRating,
                          modifier = Modifier
                              .align(Alignment.TopEnd)
                              .padding(6.dp)
                      )
          '''
          old_series_manage = '''                Text(
                          text = "•••",
                          modifier = Modifier
                              .align(Alignment.TopEnd)
                              .padding(6.dp)
          '''
          new_series_manage = '''                Text(
                          text = "•••",
                          modifier = Modifier
                              .align(Alignment.BottomEnd)
                              .padding(6.dp)
          '''
          if old_series_badge not in series:
              raise SystemExit("Series rating badge block was not found")
          if old_series_manage not in series:
              raise SystemExit("Series manage control block was not found")
          series = series.replace(old_series_badge, new_series_badge, 1)
          series = series.replace(old_series_manage, new_series_manage, 1)
          series_path.write_text(series, encoding="utf-8")

          books_path = Path("app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt")
          books = books_path.read_text(encoding="utf-8")
          old_books_badge = '''            UserRatingBadge(
                          rating = book.userRating,
                          modifier = Modifier
                              .align(Alignment.BottomStart)
                              .padding(6.dp)
                      )
          '''
          new_books_badge = '''            UserRatingBadge(
                          rating = book.userRating,
                          modifier = Modifier
                              .align(Alignment.TopEnd)
                              .padding(6.dp)
                      )
          '''
          if old_books_badge not in books:
              raise SystemExit("Book rating badge block was not found")
          books = books.replace(old_books_badge, new_books_badge, 1)
          books_path.write_text(books, encoding="utf-8")
          PY

      - name: Validate patch
        run: |
          git diff --check
          grep -A5 'UserRatingBadge(' app/src/main/java/com/example/phils_osophy/ui/screens/MovieListScreen.kt
          grep -A5 'rating = series.userRating' app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt
          grep -A5 'rating = book.userRating' app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt

      - name: Commit changes
        run: |
          rm .github/workflows/apply-media-rating-badges.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/phils_osophy/ui/screens/MovieListScreen.kt \
                  app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt \
                  app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt \
                  .github/workflows/apply-media-rating-badges.yml
          git commit -m "Restore media rating badges"
          git push origin HEAD:agent/restore-media-rating-badges
