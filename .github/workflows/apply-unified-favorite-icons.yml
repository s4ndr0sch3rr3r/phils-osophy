name: Apply unified favorite icons

on:
  push:
    branches:
      - agent/unified-favorite-icons
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-favorite-icons
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply and record favorite icon update
        run: |
          set +e
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/apply_unified_favorite_icons.py')
          text = path.read_text(encoding='utf-8')
          old = '''    if old not in text:\n        raise RuntimeError(f"Expected source block not found in {path}")\n    path.write_text(text.replace(old, new, 1), encoding="utf-8")'''
          new = '''    if old in text:\n        path.write_text(text.replace(old, new, 1), encoding="utf-8")\n        return\n    if new in text:\n        return\n    raise RuntimeError(f"Expected source block not found in {path}")'''
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
          python .github/scripts/apply_series_menu_favorite_icons.py > .github/favorite-transform.log 2>&1
          series_code=$?
          if [ "$series_code" -eq 0 ]; then
            python .github/scripts/apply_unified_favorite_icons.py >> .github/favorite-transform.log 2>&1
            code=$?
          else
            code=$series_code
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java .github/scripts/apply_unified_favorite_icons.py .github/favorite-transform.log
          git commit -m "Record favorite icon transformation" || true
          git push origin HEAD:agent/unified-favorite-icons
          exit $code
