name: Apply unified favorite icons

on:
  push:
    branches:
      - agent/unified-favorite-icons
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/unified-favorite-icons
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply and record favorite icon update
        run: |
          set +e
          python .github/scripts/apply_unified_favorite_icons.py > .github/favorite-transform.log 2>&1
          code=$?
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java .github/favorite-transform.log
          git commit -m "Record favorite icon transformation" || true
          git push origin HEAD:agent/unified-favorite-icons
          exit $code
