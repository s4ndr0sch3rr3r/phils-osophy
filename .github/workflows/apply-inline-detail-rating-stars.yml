name: Apply inline detail rating stars

on:
  push:
    branches:
      - agent/inline-detail-rating-stars

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/inline-detail-rating-stars
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python .github/scripts/apply_inline_detail_rating_stars.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/src/main/java/com/example/phils_osophy/ui/screens/UserRatingComponents.kt
          git add app/src/main/java/com/example/phils_osophy/ui/screens/MovieDetailScreen.kt
          git add app/src/main/java/com/example/phils_osophy/ui/screens/SeriesDetailScreen.kt
          git commit -m "Show inline ratings in movie and series details"
          git push
