name: Validate library header counts

on:
  pull_request:
    branches: [main]
    types: [synchronize]

permissions:
  contents: write

jobs:
  build:
    if: github.head_ref == 'agent/library-header-counts'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        env:
          TMDB_READ_TOKEN: test-token
          RAWG_API_KEY: test-key
        run: bash gradlew :app:assembleDebug

      - name: Remove temporary validation files
        run: |
          rm .github/workflows/validate-library-header-counts.yml
          rm -f library-count-build-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove temporary library count validation files"
          git push origin HEAD:${{ github.head_ref }}
