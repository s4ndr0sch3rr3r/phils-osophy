name: Update profile duration display

on:
  push:
    branches:
      - agent/profile-duration-two-units

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/profile-duration-two-units
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: python .github/scripts/update_profile_duration.py
      - run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add app/src/main/java/com/example/phils_osophy/ui/screens/ProfileScreen.kt
          if git diff --cached --quiet; then
            echo "No profile duration changes to commit"
          else
            git commit -m "Limit profile durations to two units"
            git push
          fi
