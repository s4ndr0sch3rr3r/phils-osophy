name: Apply Series all-info hero

on:
  pull_request:
    types: [opened]

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/series-all-info-in-hero

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Apply Series hero change
        run: python .github/scripts/apply_series_all_info_hero.py

      - name: Build Android debug app
        env:
          TMDB_READ_TOKEN: placeholder-token
          RAWG_API_KEY: placeholder-key
        run: bash gradlew :app:assembleDebug

      - name: Commit application change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/phils_osophy/ui/screens/SeriesDetailScreen.kt
          git commit -m "Move all Series metadata into hero"
          git push origin HEAD:agent/series-all-info-in-hero
