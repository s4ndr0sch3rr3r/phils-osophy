name: Apply lazy library sections

on:
  push:
    branches:
      - agent/lazy-expandable-library-sections
    paths:
      - tools/apply_lazy_library_sections.py
      - .github/workflows/apply-lazy-library-sections.yml

permissions:
  contents: write

jobs:
  apply-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/lazy-expandable-library-sections

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Apply source changes
        run: |
          python tools/apply_lazy_library_sections.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt
          git add app/src/main/java/com/example/phils_osophy/ui/screens/SeriesLibraryScreen.kt
          git commit -m "Make library expansion lazy and consistent"
          git push

      - name: Assemble debug
        env:
          TMDB_READ_TOKEN: placeholder
          RAWG_API_KEY: placeholder
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug
