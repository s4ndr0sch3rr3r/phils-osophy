name: Validate lazy library sections

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: read

jobs:
  assemble-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/lazy-expandable-library-sections

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Assemble debug
        env:
          TMDB_READ_TOKEN: placeholder
          RAWG_API_KEY: placeholder
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleDebug
