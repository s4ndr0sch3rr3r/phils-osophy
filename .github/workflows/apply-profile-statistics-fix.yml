name: Apply profile statistics fix

on:
  push:
    branches:
      - agent/fix-profile-statistics-refresh

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/fix-profile-statistics-refresh

      - name: Isolate TMDB lookup failures
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path("app/src/main/java/com/example/phils_osophy/ui/screens/ProfileScreen.kt")
          text = path.read_text(encoding="utf-8")

          old_movie = '''    movies.forEach { movie ->
              val runtime = TmdbClient.api.getMovieDetails(movie.id).runtime ?: 0
              movieMinutes += runtime.coerceAtLeast(0).toLong()
          }
          '''
          new_movie = '''    movies.forEach { movie ->
              val runtime = try {
                  TmdbClient.api.getMovieDetails(movie.id).runtime ?: 0
              } catch (exception: Exception) {
                  if (exception is kotlinx.coroutines.CancellationException) {
                      throw exception
                  }
                  0
              }
              movieMinutes += runtime.coerceAtLeast(0).toLong()
          }
          '''

          old_series = '''        val runtimes = TmdbClient.api.getSeriesDetails(seriesId)
                  .episodeRunTime
                  .filter { runtime -> runtime > 0 }
              val averageRuntime = if (runtimes.isEmpty()) {
                  FallbackEpisodeRuntimeMinutes
              } else {
                  runtimes.average().roundToInt()
              }
          '''
          new_series = '''        val averageRuntime = try {
                  val runtimes = TmdbClient.api.getSeriesDetails(seriesId)
                      .episodeRunTime
                      .filter { runtime -> runtime > 0 }
                  if (runtimes.isEmpty()) {
                      FallbackEpisodeRuntimeMinutes
                  } else {
                      runtimes.average().roundToInt()
                  }
              } catch (exception: Exception) {
                  if (exception is kotlinx.coroutines.CancellationException) {
                      throw exception
                  }
                  FallbackEpisodeRuntimeMinutes
              }
          '''

          if old_movie not in text:
              raise SystemExit("Movie runtime block was not found")
          if old_series not in text:
              raise SystemExit("Series runtime block was not found")

          text = text.replace(old_movie, new_movie, 1)
          text = text.replace(old_series, new_series, 1)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit fix
        run: |
          rm .github/workflows/apply-profile-statistics-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/phils_osophy/ui/screens/ProfileScreen.kt .github/workflows/apply-profile-statistics-fix.yml
          git commit -m "Handle individual TMDB statistics failures"
          git push origin HEAD:agent/fix-profile-statistics-refresh
