name: Repair book rating dialog structure

on:
  push:
    branches:
      - agent/add-ratings-all-media
    paths:
      - .github/workflows/fix-book-rating-dialog-v3.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/add-ratings-all-media
          fetch-depth: 0
      - name: Repair Kotlin function boundaries
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/com/example/phils_osophy/ui/screens/BooksMenuScreen.kt')
          text = path.read_text(encoding='utf-8')

          detail_start = text.index('private fun BookDetailScreen(')
          progress_marker = '\n@Composable\nprivate fun ReadingProgressBar'
          progress_start = text.index(progress_marker, detail_start)
          detail_close = text.rfind('\n}', detail_start, progress_start)
          if detail_close < detail_start:
              raise SystemExit('BookDetailScreen closing brace not found')

          stray_start = text.index('\n\n    if (showRatingDialog) {', progress_start)
          cover_marker = '\n@Composable\nprivate fun BookCover'
          cover_start = text.index(cover_marker, stray_start)
          stray_close = text.rfind('\n}', stray_start, cover_start)
          if stray_close < stray_start:
              raise SystemExit('Stray rating block closing brace not found')
          text = text[:stray_start] + '\n' + text[stray_close + 2:]

          progress_start = text.index(progress_marker, detail_start)
          detail_close = text.rfind('\n}', detail_start, progress_start)
          dialog = '''

              if (showRatingDialog) {
                  UserRatingDialog(
                      title = "Rate ${book.title}",
                      initialRating = book.userRating,
                      onSave = { rating ->
                          onChangeRating(rating)
                          showRatingDialog = false
                      },
                      onCancel = { showRatingDialog = false }
                  )
              }
          '''
          text = text[:detail_close] + dialog + text[detail_close:]
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/scripts/fix_book_rating_dialog.py
          rm -f .github/workflows/fix-book-rating-dialog.yml
          rm -f .github/workflows/fix-book-rating-dialog-v2.yml
          rm -f .github/workflows/fix-book-rating-dialog-v3.yml
      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Repair book rating dialog structure"
          git push origin HEAD:agent/add-ratings-all-media
